<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>什器一式リスト 作成ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a2744;
    --primary-light: #2d3f6b;
    --accent: #c8a96e;
    --accent-light: #e8d5a8;
    --bg: #f5f5f3;
    --white: #ffffff;
    --border: #d8d5cf;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --danger: #c0392b;
    --success: #27ae60;
    --sidebar-w: 220px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    font-size: 13px;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    box-shadow: 2px 0 12px rgba(0,0,0,0.18);
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .sidebar-logo h1 {
    font-family: 'Noto Serif JP', serif;
    color: var(--accent);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    line-height: 1.5;
  }
  .sidebar-logo span {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    display: block;
    margin-top: 4px;
  }
  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
  }
  .nav-section {
    margin-bottom: 20px;
  }
  .nav-label {
    color: rgba(255,255,255,0.35);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0 8px;
    margin-bottom: 6px;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 12px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.15s;
    text-align: left;
    margin-bottom: 2px;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-btn.active { background: var(--accent); color: var(--primary); font-weight: 600; }
  .nav-btn .nav-icon { font-size: 16px; flex-shrink: 0; }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .print-btn {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: var(--primary);
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .print-btn:hover { background: #dbbf7a; }

  /* ── MAIN ── */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  #topbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .header-field {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .header-field label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .header-input {
    border: none;
    border-bottom: 1.5px solid var(--border);
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--text);
    padding: 2px 0;
    outline: none;
    transition: border-color 0.15s;
  }
  .header-input:focus { border-color: var(--accent); }
  #titleInput { font-size: 16px; font-weight: 700; min-width: 200px; }
  #clientInput { min-width: 260px; }
  #dateInput { min-width: 120px; }

  .topbar-spacer { flex: 1; }

  /* ── PANELS ── */
  #content {
    padding: 28px;
    flex: 1;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    width: 4px;
    height: 20px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }

  .add-row-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .add-row-btn:hover { background: var(--primary-light); }

  /* ── TABLE 1 ── */
  .table-wrapper {
    background: var(--bg);
    border-radius: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    overflow-x: auto;
    overflow-y: visible;
    margin-bottom: 12px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    background: var(--primary);
    color: #fff;
    padding: 11px 12px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-align: center;
    white-space: nowrap;
    position: relative;
    overflow: visible;
  }
  thead th:first-child { border-radius: 0; }

  .col-resizer {
    position: absolute;
    top: 0; right: -3px;
    width: 6px; height: 100%;
    cursor: col-resize;
    z-index: 10;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .col-resizer::after {
    content: '';
    width: 2px;
    height: 60%;
    background: rgba(255,255,255,0.25);
    border-radius: 1px;
    transition: background 0.12s;
  }
  .col-resizer:hover::after,
  .col-resizer.resizing::after { background: var(--accent); }
  #panel-table1 table { table-layout: fixed; width: auto; }
  tbody tr { border-bottom: 1px solid #eeede9; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf9f6; }
  tbody td { padding: 6px 8px; vertical-align: middle; overflow: hidden; white-space: nowrap; }
  .td-no { text-align: center; color: var(--text-muted); font-size: 12px; min-width: 36px; }
  .td-num { text-align: right; }

  .cell-input {
    width: 100%;
    border: 1.5px solid transparent;
    background: transparent;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--text);
    padding: 4px 6px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.12s, background 0.12s;
  }
  .cell-input:focus {
    border-color: var(--accent);
    background: #fffcf4;
  }
  .cell-input.num-input { text-align: right; }

  .delete-btn {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    border-radius: 4px;
    transition: color 0.12s, background 0.12s;
    line-height: 1;
  }
  .delete-btn:hover { color: var(--danger); background: #fdf0ef; }

  .total-amount {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    font-family: 'Noto Serif JP', serif;
  }
  tfoot td {
    padding: 5px 8px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: right;
    white-space: nowrap;
  }
  tfoot .tfoot-grand td {
    border-top: 2px solid var(--primary);
    padding-top: 8px;
    padding-bottom: 10px;
    color: var(--primary);
    font-weight: 700;
  }
  tfoot .tfoot-grand #grandTotal {
    font-size: 18px;
    font-family: 'Noto Serif JP', serif;
  }

  /* ── TABLE 2 GRID EDITOR ── */
  .grid-editor {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }
  .grid-card-edit {
    background: var(--white);
    border-radius: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .grid-card-edit:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

  .card-no-bar {
    background: var(--primary);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .img-input-hidden { display: none; }

  /* 複数画像ギャラリー */
  .card-imgs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .card-img-thumb {
    position: relative;
    width: calc(50% - 3px);
    aspect-ratio: 4/3;
    background: #f0ede6;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .card-img-thumb img {
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .card-img-thumb .rm-img {
    position: absolute;
    top: 3px; right: 3px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    line-height: 18px;
    text-align: center;
    cursor: pointer;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .card-img-thumb .rm-img:hover { background: var(--danger); }
  .card-img-add {
    width: calc(50% - 3px);
    aspect-ratio: 4/3;
    background: #f0ede6;
    border: 2px dashed var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 10px;
    transition: border-color 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .card-img-add:hover { border-color: var(--accent); color: var(--accent); }
  .card-img-add .icon { font-size: 20px; }

  .card-field {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .card-field label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.06em;
  }
  .card-field input {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.12s;
    background: var(--bg);
  }
  .card-field input:focus { border-color: var(--accent); background: #fffcf4; }

  /* 表2表示トグル */
  .eye-btn {
    background: none; border: none; cursor: pointer;
    font-size: 15px; padding: 3px 5px; border-radius: 4px;
    transition: background 0.12s; line-height: 1;
  }
  .eye-btn:hover { background: rgba(0,0,0,0.06); }
  .row-hidden-t2 td { opacity: 0.35; }
  .row-hidden-t2 td:last-child { opacity: 1; }

  /* パターン（バリアント） */
  .variant-section {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    background: var(--bg);
    transition: border-color 0.15s, background 0.15s;
  }
  .variant-header {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  }
  .variant-label-input {
    border: 1.5px solid var(--border); border-radius: 6px;
    padding: 3px 8px; font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; font-weight: 600; color: var(--primary);
    width: 70px; outline: none; background: var(--white);
  }
  .variant-label-input:focus { border-color: var(--accent); }
  .add-variant-btn {
    width: 100%; padding: 6px;
    background: none; border: 1.5px dashed var(--border);
    border-radius: 6px; font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px; color: var(--text-muted); cursor: pointer;
    transition: all 0.12s;
  }
  .add-variant-btn:hover { border-color: var(--accent); color: var(--accent); background: #fffcf4; }

  .add-card-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 32px;
    background: var(--white);
    border-radius: 12px;
    border: 2px dashed var(--border);
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
    transition: all 0.15s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .add-card-btn:hover { border-color: var(--accent); color: var(--accent); background: #fffcf4; }
  .add-card-btn span { font-size: 28px; }

  /* ── PREVIEW PANEL ── */
  #previewArea {
    background: #e8e6e0;
    padding: 28px;
    border-radius: 12px;
    min-height: 500px;
  }
  .preview-page {
    background: var(--white);
    width: 100%;
    max-width: 210mm;
    margin: 0 auto 32px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    padding: 24px 28px;
    position: relative;
  }
  .preview-page-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--primary);
    border-bottom: 2px solid var(--primary);
    padding-bottom: 10px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .preview-client {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .preview-date {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Preview Table 1 */
  .preview-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .preview-table thead th {
    background: var(--primary);
    color: #fff;
    padding: 7px 10px;
    font-size: 11px;
    font-weight: 500;
    text-align: center;
    white-space: nowrap;
  }
  .preview-table tbody td {
    padding: 6px 10px;
    border-bottom: 1px solid #eee;
    vertical-align: middle;
    overflow: hidden;
    white-space: nowrap;
  }
  .preview-table tbody tr:last-child td { border-bottom: none; }
  .preview-table tbody tr:nth-child(even) td { background: #faf9f6; }
  .preview-total-row td {
    font-weight: 700;
    background: #f0ede6 !important;
    border-top: 2px solid var(--primary);
    padding: 8px 10px;
  }
  .p-td-no { text-align: center; color: var(--text-muted); }
  .p-td-right { text-align: right; }
  .p-td-center { text-align: center; }

  /* Preview Grid */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .preview-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .preview-card-head {
    background: var(--primary);
    color: #fff;
    padding: 4px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
  }
  .preview-card-head strong { color: var(--accent); font-size: 11px; }
  .preview-card-img {
    width: 100%;
    aspect-ratio: 4/3;
    background: #f0ede6;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview-card-img img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .preview-card-img .no-img {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
  }
  .preview-card-info {
    padding: 6px 8px;
    font-size: 10px;
  }
  .preview-card-name {
    font-weight: 600;
    font-size: 11px;
    margin-bottom: 3px;
  }
  .preview-card-row {
    color: var(--text-muted);
    margin-bottom: 1px;
  }
  .preview-card-row span { color: var(--text); }

  /* ── URL INPUT ROW ── */
  .img-url-row {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }
  .img-url-input {
    flex: 1;
    min-width: 0;
    padding: 5px 8px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }
  .img-url-input:focus { border-color: var(--accent); }
  .img-url-btn {
    padding: 5px 10px;
    background: var(--accent);
    color: var(--primary);
    border: none;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--primary);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── PRINT ── */
  @media print {
    @page { size: A4 landscape; margin: 20mm 14mm 22mm 14mm; }
    body { background: #fff; }
    #sidebar, #topbar, .section-header, .add-row-btn, .delete-btn,
    .add-card-btn, .card-img-area label { display: none !important; }
    #main { margin-left: 0; }
    #content { padding: 0; }
    .panel { display: none !important; }
    #printArea { display: block !important; }
    .print-page {
      page-break-after: always;
      padding: 0;
    }
    .print-page:last-child { page-break-after: avoid; }
    .preview-page {
      box-shadow: none;
      max-width: none;
      width: 100%;
      padding: 0;
      margin: 0;
    }
    .preview-grid { grid-template-columns: repeat(4, 1fr); }
  }

  #printArea { display: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-logo">
    <h1>什器一式<br>リスト作成</h1>
    <span>Furniture List Tool</span>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-label">編集</div>
      <button class="nav-btn active" onclick="switchPanel('table1')" id="nav-table1">
        <span class="nav-icon">📋</span> 表1 価格一覧
      </button>
      <button class="nav-btn" onclick="switchPanel('table2')" id="nav-table2">
        <span class="nav-icon">🖼️</span> 表2 商品画像
      </button>
    </div>
  </div>
  <div class="sidebar-footer">
    <button class="print-btn" onclick="doPrint()">
      🖨️ 印刷 / PDF出力
    </button>
    <button onclick="syncPrintWidths()" style="margin-top:8px;width:100%;padding:8px;background:none;border:1.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);border-radius:8px;font-size:11px;cursor:pointer" title="画面の列幅を印刷幅に反映する">
      📐 印刷幅を現在の列幅に更新
    </button>
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="header-field">
      <label>タイトル</label>
      <input id="titleInput" class="header-input" value="什器一式リスト" oninput="saveData()">
    </div>
    <div class="header-field">
      <label>宛先</label>
      <input id="clientInput" class="header-input" value="磯商様" oninput="saveData()">
    </div>
    <div class="header-field">
      <label>日付</label>
      <input id="dateInput" class="header-input" type="text" oninput="saveData()">
    </div>
    <div class="topbar-spacer"></div>
    <div style="font-size:11px;color:var(--text-muted);">💾 自動保存</div>
  </div>

  <div id="content">

    <!-- TABLE 1 PANEL -->
    <div class="panel active" id="panel-table1">
      <div class="section-header">
        <div class="section-title">表1 — 価格一覧表</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="togglePriceBtn" class="add-row-btn" onclick="togglePriceColumns()"
            style="background:var(--bg);color:var(--text-muted);border:1.5px solid var(--border)">
            📋 合計行を非表示
          </button>
          <button class="add-row-btn" onclick="addItem()">＋ 行を追加</button>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:40px">No.</th>
              <th>商品名</th>
              <th>寸法</th>
              <th style="width:90px">色</th>
              <th style="width:60px">数量</th>
              <th style="width:100px">単価<br><span style="font-size:10px;font-weight:400;opacity:0.75">税抜</span></th>
              <th style="width:110px">小計<br><span style="font-size:10px;font-weight:400;opacity:0.75">税抜</span></th>
              <th style="width:120px">合計<br><span style="font-size:10px;font-weight:400;opacity:0.75">税込10%</span></th>
              <th style="width:36px"></th>
            </tr>
          </thead>
          <tbody id="table1Body"></tbody>
          <tfoot>
            <tr>
              <td colspan="5" style="text-align:right">小計（税抜）</td>
              <td></td>
              <td id="subTotalBar" style="font-weight:600;color:var(--text-muted)">¥0</td>
              <td></td>
              <td></td>
            </tr>
            <tr>
              <td colspan="5" style="text-align:right">消費税（10%）</td>
              <td></td>
              <td></td>
              <td id="taxBar" style="font-weight:600;color:var(--text-muted)">¥0</td>
              <td></td>
            </tr>
            <tr class="tfoot-grand">
              <td colspan="5" style="text-align:right">合計（税込）</td>
              <td></td>
              <td></td>
              <td id="grandTotal">¥0</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <!-- TABLE 2 PANEL -->
    <div class="panel" id="panel-table2">
      <div class="section-header">
        <div class="section-title">表2 — 商品画像グリッド</div>
        <button class="add-row-btn" onclick="addItem()">＋ 商品を追加</button>
      </div>
      <div class="grid-editor" id="gridEditor"></div>
    </div>


  </div><!-- /content -->
</div><!-- /main -->

<!-- PRINT AREA -->
<div id="printArea"></div>

<div id="toast">保存しました</div>

<script>
// ── STATE ──
// 商品名・サイズ・数量は state.items で一元管理
// 表1固有: color, price / 表2固有: img
let state = {
  title: '什器一式リスト',
  client: '磯商様',
  date: '',
  items: [],
  colWidths: [40, null, null, 90, 60, 100, 110, 120],  // 画面表示の列幅
  printColWidths: null,  // 印刷用固定列幅（nullの場合はcolWidthsから初期化）
  showPrice: true
};

const DEFAULT_ITEMS = [
  { name:'片袖机',                   size:'幅1200mm×奥行600mm',              color:'ホワイト',          qty:5, price:24000,  img:'' },
  { name:'机上ローラック',            size:'幅1200mm',                         color:'ホワイト',          qty:5, price:7700,   img:'' },
  { name:'オフィスチェア',            size:'幅700×奥行700×高さ1000〜1100mm',  color:'ブラック（クロス）', qty:5, price:23200,  img:'' },
  { name:'受付カウンター',            size:'本体/幅900×奥行454×高さ950mm',    color:'ホワイト',          qty:1, price:44300,  img:'' },
  { name:'4人用 会議セット',          size:'テーブル/幅1800×奥行900×高さ720mm', color:'ブラック・ナチュラル', qty:1, price:109100, imgs:[] },
  { name:'電話台',                   size:'幅350×奥行350×高さ730mm',          color:'ナチュラル／ホワイト', qty:1, price:7100,  img:'' },
  { name:'スチール製オープン書庫',    size:'外寸/幅900×奥行400×高さ2100mm',   color:'—',                qty:2, price:41800,  img:'' },
  { name:'スチール製両開き書庫(上)',  size:'外寸/幅900×奥行400×高さ1050mm',   color:'ホワイト',          qty:1, price:33200,  img:'' },
  { name:'スチール製引戸書庫(下)',    size:'外寸/幅900×奥行400×高さ1050mm',   color:'ホワイト',          qty:1, price:32600,  img:'' },
  { name:'ベース（No.7と9の下に置きます）', size:'幅900×奥行400×高さ60mm',    color:'ホワイト',          qty:3, price:6700,   img:'' },
  { name:'スチールロッカー 鍵付き 3人用', size:'幅900×奥行515×高さ1790mm',   color:'—',                qty:4, price:30300,  img:'' },
  { name:'配送組立費　※階段上げ込み', size:'—',                              color:'—',                qty:1, price:255600, imgs:[] },
  { name:'手配費（10%）',            size:'—',                              color:'—',                qty:1, price:98130,  img:'' },
];

// ── INIT ──
function init() {
  const today = new Date();
  const ymd = today.getFullYear() + '年' + (today.getMonth()+1) + '月' + today.getDate() + '日';
  document.getElementById('dateInput').value = ymd;

  const saved = localStorage.getItem('jikuList_v2');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      // フィールドマイグレーション
      if (d.items) d.items.forEach(item => {
        if (!item.imgs) { item.imgs = item.img ? [item.img] : []; delete item.img; }
        if (item.showInTable2 === undefined) item.showInTable2 = true;
        if (item.includeInTotal === undefined) item.includeInTotal = true;
        if (!item.variants) item.variants = [];
      });
      state = { ...state, ...d };
    } catch(e) {}
  } else {
    // 旧データ（v1）があれば移行
    const old = localStorage.getItem('jikuList');
    if (old) {
      try {
        const d = JSON.parse(old);
        if (d.rows) {
          state.items = d.rows.map(r => ({ ...r, img: '' }));
          state.title = d.title || state.title;
          state.client = d.client || state.client;
          state.date = d.date || state.date;
        } else {
          state.items = DEFAULT_ITEMS.map((r,i) => ({ id: Date.now()+i, ...r }));
        }
      } catch(e) {
        state.items = DEFAULT_ITEMS.map((r,i) => ({ id: Date.now()+i, ...r }));
      }
    } else {
      state.items = DEFAULT_ITEMS.map((r,i) => ({ id: Date.now()+i, ...r }));
    }
  }

  document.getElementById('titleInput').value = state.title || '什器一式リスト';
  document.getElementById('clientInput').value = state.client || '磯商様';
  if (state.date) document.getElementById('dateInput').value = state.date;

  renderTable1();
  renderTable2();
  initResizers();
  // printColWidths未設定なら現在のcolWidthsから初期化
  if (!state.printColWidths) {
    state.printColWidths = [...(state.colWidths || [])];
    saveData();
  }
}

// ── SAVE ──
let saveTimer;
function saveData() {
  state.title = document.getElementById('titleInput').value;
  state.client = document.getElementById('clientInput').value;
  state.date = document.getElementById('dateInput').value;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localStorage.setItem('jikuList_v2', JSON.stringify(state));
    showToast('自動保存しました');
  }, 600);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── PANEL SWITCH ──
function switchPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}

// ── 共通: アイテム更新 ──
function updateItem(id, field, value) {
  const item = state.items.find(r => r.id === id);
  if (!item) return;
  if (field === 'qty' || field === 'price') {
    item[field] = parseFloat(String(value).replace(/[^0-9.]/g,'')) || 0;
  } else {
    item[field] = value;
  }
  saveData();
}

function deleteItem(id) {
  state.items = state.items.filter(r => r.id !== id);
  renderTable1();
  renderTable2();
  saveData();
}

function addItem() {
  state.items.push({ id: Date.now(), name:'', size:'', color:'', qty:1, price:0, img:'' });
  renderTable1();
  renderTable2();
  saveData();
}

// ── TABLE 1 ──
// 表1での変更: name/size/qty は共通。color/price は表1固有。
// name/size/qty を編集した際に表2のカードも即時反映（DOMを直接更新）
function updateTable1Field(id, field, value) {
  updateItem(id, field, value);
  if (field === 'qty' || field === 'price') {
    updateSubtotalCell(id);
    updateGrandTotal();
  }
  // 共通フィールドは表2のカードにも即時反映
  if (field === 'name' || field === 'size' || field === 'qty') {
    syncToCard(id, field, value);
  }
}

function syncToCard(id, field, value) {
  if (field === 'name') {
    const el = document.getElementById('cardName_' + id);
    if (el) el.value = value;
  } else if (field === 'size') {
    const el = document.getElementById('cardSize_' + id);
    if (el) el.value = value;
  } else if (field === 'qty') {
    const el = document.getElementById('cardQty_' + id);
    if (el) el.value = value;
  }
}

function updateSubtotalCell(id) {
  const item = state.items.find(r => r.id === id);
  if (!item) return;
  const sub = (item.qty||0) * (item.price||0);
  const taxed = Math.round(sub * 1.1);
  const subEl = document.getElementById('sub_' + id);
  const taxEl = document.getElementById('tax_' + id);
  if (subEl) subEl.textContent = sub ? sub.toLocaleString()+'円' : '—';
  if (taxEl) taxEl.textContent = sub ? taxed.toLocaleString()+'円' : '—';
}

function updateGrandTotal() {
  let subTotal = 0;
  state.items.forEach(r => {
    if (r.includeInTotal !== false) subTotal += (r.qty||0)*(r.price||0);
  });
  const tax = Math.round(subTotal * 0.1);
  const grandTotal = subTotal + tax;
  const subEl = document.getElementById('subTotalBar');
  const taxEl = document.getElementById('taxBar');
  const grandEl = document.getElementById('grandTotal');
  if (subEl) subEl.textContent = '¥' + subTotal.toLocaleString();
  if (taxEl) taxEl.textContent = '¥' + tax.toLocaleString();
  if (grandEl) grandEl.textContent = '¥' + grandTotal.toLocaleString();
}

function renderTable1() {
  const tbody = document.getElementById('table1Body');
  tbody.innerHTML = '';
  state.items.forEach((item, idx) => {
    const tr = document.createElement('tr');
    const sub = (item.qty||0)*(item.price||0);
    const taxed = Math.round(sub * 1.1);
    const hiddenT2 = item.showInTable2 === false;
    const excluded = item.includeInTotal === false;
    if (hiddenT2) tr.classList.add('row-hidden-t2');
    const subDisp = sub ? sub.toLocaleString()+'円' : '—';
    const taxDisp = sub ? taxed.toLocaleString()+'円' : '—';
    const subStyle = excluded ? 'padding-right:8px;color:var(--text-muted);text-decoration:line-through' : 'padding-right:8px;color:var(--text-muted)';
    const taxStyle = excluded ? 'font-weight:600;padding-right:12px;text-decoration:line-through;color:var(--text-muted)' : 'font-weight:600;padding-right:12px';
    tr.innerHTML = `
      <td class="td-no">${idx+1}</td>
      <td><input class="cell-input" value="${esc(item.name)}" oninput="updateTable1Field(${item.id},'name',this.value)" placeholder="商品名"></td>
      <td><input class="cell-input" value="${esc(item.size)}" oninput="updateTable1Field(${item.id},'size',this.value)" placeholder="寸法"></td>
      <td><input class="cell-input" value="${esc(item.color)}" oninput="updateItem(${item.id},'color',this.value)" placeholder="色"></td>
      <td><input class="cell-input num-input" style="width:56px" value="${item.qty}" oninput="updateTable1Field(${item.id},'qty',this.value)" placeholder="0"></td>
      <td><input class="cell-input num-input" value="${item.price}" oninput="updateTable1Field(${item.id},'price',this.value)" placeholder="0"></td>
      <td class="td-num" id="sub_${item.id}" style="${subStyle}">${subDisp}</td>
      <td class="td-num" id="tax_${item.id}" style="${taxStyle}">${taxDisp}</td>
      <td style="white-space:nowrap">
        <button class="eye-btn" onclick="toggleIncludeInTotal(${item.id})" title="${excluded?'合計に含める':'合計から除外する'}" style="opacity:${excluded?0.4:1}">Σ</button>
        <button class="eye-btn" onclick="toggleTable2(${item.id})" title="${hiddenT2?'表2に表示する':'表2から非表示にする'}">${hiddenT2?'🙈':'👁'}</button>
        <button class="delete-btn" onclick="deleteItem(${item.id})" title="削除">×</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  updateGrandTotal();
  applyPriceVisibility();
}

// ── TABLE 2 ──
// 表2での変更: name/size/qty は共通。img は表2固有。
// name/size/qty を編集した際に表1の入力欄にも即時反映
function updateTable2Field(id, field, value) {
  updateItem(id, field, value);
  if (field === 'name' || field === 'size' || field === 'qty') {
    syncToTable1(id, field, value);
    if (field === 'qty') {
      updateSubtotalCell(id);
      updateGrandTotal();
    }
  }
}

function syncToTable1(id, field, value) {
  // 表1のinput要素を対象フィールドで特定
  const tbody = document.getElementById('table1Body');
  if (!tbody) return;
  const rows = tbody.querySelectorAll('tr');
  const idx = state.items.findIndex(r => r.id === id);
  if (idx < 0 || idx >= rows.length) return;
  const cells = rows[idx].querySelectorAll('input');
  // cells[0]=name, [1]=size, [2]=color, [3]=qty, [4]=price
  const colMap = { name: 0, size: 1, qty: 3 };
  if (colMap[field] !== undefined) {
    cells[colMap[field]].value = value;
  }
}

// ── 表2 表示トグル ──
function toggleTable2(id) {
  const item = state.items.find(r => r.id === id);
  if (!item) return;
  item.showInTable2 = (item.showInTable2 === false) ? true : false;
  renderTable1();
  renderTable2();
  saveData();
}

// ── 合計行（tfoot） 表示/非表示 ──
function applyPriceVisibility() {
  const show = state.showPrice;
  const table = document.querySelector('#panel-table1 table');
  if (!table) return;

  // tfoot のみ切り替え（列は常に表示）
  const tfoot = table.querySelector('tfoot');
  if (tfoot) tfoot.style.display = show ? '' : 'none';

  // ボタンラベル更新
  const btn = document.getElementById('togglePriceBtn');
  if (btn) {
    btn.textContent = show ? '📋 合計行を非表示' : '📋 合計行を表示';
    btn.style.background = show ? 'var(--bg)' : 'var(--primary)';
    btn.style.color = show ? 'var(--text-muted)' : '#fff';
    btn.style.borderColor = show ? 'var(--border)' : 'var(--primary)';
  }
}

function togglePriceColumns() {
  state.showPrice = !state.showPrice;
  applyPriceVisibility();
  saveData();
}

// ── 合計に含める/含めないトグル ──
function toggleIncludeInTotal(id) {
  const item = state.items.find(r => r.id === id);
  if (!item) return;
  item.includeInTotal = (item.includeInTotal === false) ? true : false;
  renderTable1();
  saveData();
}

function addVariant(id) {
  const item = state.items.find(r => r.id === id);
  if (!item) return;
  if (!item.variants) item.variants = [];
  const labels = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'];
  item.variants.push({ id: Date.now(), label: labels[item.variants.length] || String(item.variants.length+1), imgs: [] });
  renderTable2();
  saveData();
}

function removeVariant(itemId, variantId) {
  const item = state.items.find(r => r.id === itemId);
  if (!item) return;
  item.variants = item.variants.filter(v => v.id !== variantId);
  renderTable2();
  saveData();
}

function updateVariantLabel(itemId, variantId, value) {
  const item = state.items.find(r => r.id === itemId);
  if (!item) return;
  const v = item.variants.find(v => v.id === variantId);
  if (v) { v.label = value; saveData(); }
}

function addVariantImage(itemId, variantId, src) {
  const item = state.items.find(r => r.id === itemId);
  if (!item) return;
  const v = item.variants.find(v => v.id === variantId);
  if (!v) return;
  if (!v.imgs) v.imgs = [];
  v.imgs.push(src);
  refreshVariantImgs(itemId, variantId);
  saveData();
}

function removeVariantImage(itemId, variantId, imgIdx) {
  const item = state.items.find(r => r.id === itemId);
  if (!item) return;
  const v = item.variants.find(v => v.id === variantId);
  if (!v) return;
  v.imgs.splice(imgIdx, 1);
  refreshVariantImgs(itemId, variantId);
  saveData();
}

function refreshVariantImgs(itemId, variantId) {
  const item = state.items.find(r => r.id === itemId);
  const container = document.getElementById(`varImgs_${itemId}_${variantId}`);
  if (!container || !item) return;
  const v = item.variants.find(v => v.id === variantId);
  if (!v) return;
  const imgs = v.imgs || [];
  container.innerHTML = imgs.map((src, i) => `
    <div class="card-img-thumb">
      <img src="${src}" alt="">
      <button class="rm-img" onclick="removeVariantImage(${itemId},${variantId},${i})">×</button>
    </div>
  `).join('') + `
    <div class="card-img-add" onclick="document.getElementById('varFile_${itemId}_${variantId}').click()">
      <span class="icon">＋</span>画像
    </div>
    <div class="img-url-row">
      <input class="img-url-input" type="url" placeholder="画像URLを貼り付け" id="urlInput_${itemId}_${variantId}"
        onkeydown="if(event.key==='Enter')addImageFromUrl(${itemId},${variantId})">
      <button class="img-url-btn" onclick="addImageFromUrl(${itemId},${variantId})">追加</button>
    </div>
  `;
}

function handleVariantImgUpload(itemId, variantId, input) {
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => addVariantImage(itemId, variantId, e.target.result);
    reader.readAsDataURL(file);
  });
  input.value = '';
}

// ── 通常画像 ──
function addCardImage(id, src) {
  const item = state.items.find(r => r.id === id);
  if (!item) return;
  if (!item.imgs) item.imgs = [];
  item.imgs.push(src);
  refreshCardImgs(id);
  saveData();
}

function removeCardImage(id, idx) {
  const item = state.items.find(r => r.id === id);
  if (!item || !item.imgs) return;
  item.imgs.splice(idx, 1);
  refreshCardImgs(id);
  saveData();
}

function refreshCardImgs(id) {
  const item = state.items.find(r => r.id === id);
  const container = document.getElementById('cardImgs_' + id);
  if (!container || !item) return;
  const imgs = item.imgs || [];
  container.innerHTML = imgs.map((src, i) => `
    <div class="card-img-thumb">
      <img src="${src}" alt="">
      <button class="rm-img" onclick="removeCardImage(${id},${i})">×</button>
    </div>
  `).join('') + `
    <div class="card-img-add" onclick="document.getElementById('fileInput_${id}').click()">
      <span class="icon">＋</span>画像を追加
    </div>
    <div class="img-url-row">
      <input class="img-url-input" type="url" placeholder="画像URLを貼り付け" id="urlInput_${id}"
        onkeydown="if(event.key==='Enter')addImageFromUrl(${id},null)">
      <button class="img-url-btn" onclick="addImageFromUrl(${id},null)">追加</button>
    </div>
  `;
}

function handleImgUpload(id, input) {
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => addCardImage(id, e.target.result);
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderTable2() {
  const editor = document.getElementById('gridEditor');
  editor.innerHTML = '';

  state.items.forEach((item, idx) => {
    if (item.showInTable2 === false) return;
    const variants = item.variants || [];
    const div = document.createElement('div');
    div.className = 'grid-card-edit';
    div.id = 'varCard_' + item.id;

    const variantsHTML = variants.map(v => `
      <div class="variant-section">
        <div class="variant-header">
          <input class="variant-label-input" value="${esc(v.label)}"
            oninput="updateVariantLabel(${item.id},${v.id},this.value)" placeholder="①">
          <button class="delete-btn" style="font-size:12px;margin-left:auto" onclick="removeVariant(${item.id},${v.id})" title="パターン削除">×</button>
        </div>
        <div class="card-imgs" id="varImgs_${item.id}_${v.id}"></div>
        <input class="img-input-hidden" type="file" id="varFile_${item.id}_${v.id}"
          accept="image/*" multiple onchange="handleVariantImgUpload(${item.id},${v.id},this)">
      </div>
    `).join('');

    const mainImgsHTML = variants.length === 0 ? `
      <div class="card-imgs" id="cardImgs_${item.id}"></div>
      <input class="img-input-hidden" type="file" id="fileInput_${item.id}"
        accept="image/*" multiple onchange="handleImgUpload(${item.id},this)">
    ` : '';

    div.innerHTML = `
      <div class="card-no-bar">
        <strong>No.${idx+1}</strong>
        <button class="delete-btn" style="color:rgba(255,255,255,0.4);font-size:14px" onclick="deleteItem(${item.id})" title="削除">×</button>
      </div>
      <div class="card-body">
        ${mainImgsHTML}
        ${variantsHTML}
        <button class="add-variant-btn" onclick="addVariant(${item.id})">＋ パターンを追加</button>
        <div class="card-field">
          <label>商品名 <span style="color:var(--accent);font-size:9px">（表1と共通）</span></label>

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── COLUMN RESIZER (画面表示のみ・印刷幅は別管理) ──
function initResizers() {
  const table = document.querySelector('#panel-table1 table');
  if (!table) return;
  const ths = Array.from(table.querySelectorAll('thead th'));

  // 保存済み画面幅を適用（明示保存された列のみ固定、それ以外はautoで残りを埋める）
  ths.forEach((th, i) => {
    if (i < state.colWidths.length && state.colWidths[i]) {
      th.style.width = state.colWidths[i] + 'px';
    }
  });

  // ドラッグハンドルを追加（スペーサー列・ボタン列はスキップ）
  ths.forEach((th, i) => {
    if (i === ths.length - 1) return; // ボタン列はスキップ
    const resizer = document.createElement('div');
    resizer.className = 'col-resizer';
    th.appendChild(resizer);

    let startX, startW;
    resizer.addEventListener('mousedown', e => {
      startX = e.pageX;
      startW = th.offsetWidth;
      resizer.classList.add('resizing');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      const onMove = e => {
        th.style.width = Math.max(36, startW + e.pageX - startX) + 'px';
      };
      const onUp = () => {
        resizer.classList.remove('resizing');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        state.colWidths = ths.slice(0, -1).map(t => t.style.width ? t.offsetWidth : null);
        saveData();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
    });
  });
}

// ── テキスト縮小（プレビュー・印刷用） ──
function shrinkOverflowCells(root) {
  root.querySelectorAll('td, th').forEach(cell => {
    if (cell.querySelector('input')) return; // 入力欄は除外
    const minSize = 8;
    let fs = parseFloat(getComputedStyle(cell).fontSize);
    while (cell.scrollWidth > cell.offsetWidth + 1 && fs > minSize) {
      fs -= 0.5;
      cell.style.fontSize = fs + 'px';
    }
  });
}

function syncPrintWidths() {
  state.printColWidths = [...state.colWidths];

// ── URL直貼りで画像追加 ──
function addImageFromUrl(itemId, variantId) {
  const inputId = variantId !== null
    ? `urlInput_${itemId}_${variantId}`
    : `urlInput_${itemId}`;
  const input = document.getElementById(inputId);
  if (!input) return;
  const src = input.value.trim();
  if (!src) return;
  if (variantId !== null) {
    addVariantImage(itemId, variantId, src);
  } else {
    addCardImage(itemId, src);
  }
  input.value = '';
  showToast('画像を追加しました');
}
