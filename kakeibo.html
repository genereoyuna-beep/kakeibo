  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f4f8;
      --surface: #fff;
      --border: #e2e8f0;
      --text: #2d3748;
      --muted: #718096;
      --primary: #4a6fa5;
      --radius: 8px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; min-height: 100vh; }

    /* ── HEADER ── */
    .sticky-shell { position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
    .header { background: #fff; border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
    .header-title { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .nav-btn { width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 6px; background: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    .nav-btn:hover { background: var(--bg); }
    .month-label { font-weight: 700; font-size: 16px; min-width: 90px; text-align: center; }

    /* ── LAYOUT ── */
    .layout { display: flex; gap: 14px; padding: 14px; align-items: flex-start; max-width: 1440px; margin: 0 auto; }
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; }
    .sidebar { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
    @media (max-width: 1050px) { .layout { flex-direction: column; } .sidebar { width: 100%; } }

    /* ── PANEL ── */
    .panel { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .panel-header { padding: 9px 14px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 12px; border-bottom: 1px solid var(--border); }
    .panel-header.blue  { background: #ebf8ff; color: #2b6cb0; }
    .panel-header.red   { background: #fff5f5; color: #c53030; }
    .panel-header.gray  { background: #f7fafc; color: var(--text); }
    .panel-header.green { background: #f0fff4; color: #276749; }

    /* ── TABLE ── */
    table { width: 100%; border-collapse: collapse; }
    th { padding: 6px 10px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); background: #f7fafc; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th.r { text-align: right; }
    td { padding: 5px 10px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
    td.r { text-align: right; }
    tr.data:hover td { background: #f7fafc; }
    tr:last-child td { border-bottom: none; }

    .sec-row td { background: #f0f4f8; font-weight: 700; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 5px 10px; }
    .sub-row td { background: #edf2f7; font-weight: 700; padding: 5px 10px; }
    .sub-row td.r { color: var(--primary); }
    .total-row td { background: #2d3748; color: #fff; font-weight: 700; padding: 8px 10px; }
    .total-row td.r { color: #90cdf4; }
    .empty td { color: var(--muted); font-style: italic; text-align: center; padding: 10px; }

    /* ── CHIPS ── */
    .chip { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    [data-cat="書籍・試験費"] { background: #c6f6d5; color: #22543d; }
    [data-cat="推し活費"]     { background: #fefcbf; color: #744210; }
    [data-cat="通信費"]       { background: #e9d8fd; color: #553c9a; }
    [data-cat="食費"]         { background: #feebc8; color: #7b341e; }
    [data-cat="日用品費"]     { background: #c6f6d5; color: #276749; }
    [data-cat="医療費"]       { background: #bee3f8; color: #2a4365; }
    [data-cat="美容費"]       { background: #fed7d7; color: #742a2a; }
    [data-cat="交際費"]       { background: #b2f5ea; color: #234e52; }
    [data-cat="交通費"]       { background: #c4f1f9; color: #065666; }
    [data-cat="趣味費"]       { background: #d9f99d; color: #365314; }
    [data-cat="その他"]       { background: #e2e8f0; color: #4a5568; }
    [data-pay="JCBカード(旧)"]{ background: #bee3f8; color: #2c5282; }
    [data-pay="ANAカード"]    { background: #b2f5ea; color: #234e52; }
    [data-pay="楽天カード"]   { background: #fed7d7; color: #742a2a; }
    [data-pay="セゾンカード"] { background: #fefcbf; color: #744210; }
    [data-pay="Paidy"]        { background: #feebc8; color: #7b341e; }
    [data-pay="atone"]        { background: #e2e8f0; color: #4a5568; }
    [data-pay="PayPay"]       { background: #ffebe9; color: #c53030; }
    [data-pay="AC"]           { background: #fed7d7; color: #c05621; }
    [data-pay="DCカード"]     { background: #e9d8fd; color: #553c9a; }
    [data-pay="現金"]         { background: #c6f6d5; color: #276749; }
    [data-pay="Appleギフト"]  { background: #e2e8f0; color: #4a5568; }

    /* ── BUTTONS ── */
    .btn { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; color: var(--text); display: inline-flex; align-items: center; gap: 4px; line-height: 1.4; }
    .btn:hover { background: var(--bg); }
    .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn.primary:hover { background: #3a5a8a; }
    .btn.sm { padding: 2px 8px; font-size: 11px; }
    .btn.icon { padding: 2px 5px; border: none; background: transparent; color: var(--muted); border-radius: 4px; }
    .btn.icon:hover { background: var(--border); color: var(--text); }
    .btn-row { display: flex; gap: 6px; align-items: center; }

    /* ── MODAL ── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #fff; border-radius: 10px; padding: 22px; width: 460px; max-width: 95vw; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    .modal-title { font-weight: 700; font-size: 15px; margin-bottom: 18px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .field input, .field select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; color: var(--text); background: #fff; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(74,111,165,0.15); }
    .field-row { display: flex; gap: 10px; }
    .field-row .field { flex: 1; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

    /* ── MISC ── */
    .amount { font-variant-numeric: tabular-nums; white-space: nowrap; }
    .show-sp { display: none; }
    .red  { color: #e53e3e; }
    .green { color: #38a169; }
    .bold { font-weight: 700; }
    .muted { color: var(--muted); }

    /* Apple残高 */
    .apple-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
    .apple-item { display: flex; flex-direction: column; gap: 3px; }
    .apple-label { font-size: 11px; color: var(--muted); font-weight: 500; }
    .apple-input { border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font-size: 13px; font-weight: 700; text-align: right; width: 100%; }
    .apple-input:focus { outline: none; border-color: var(--primary); }

    /* Chart */
    .chart-wrap { position: relative; width: 150px; height: 150px; margin: 0 auto 10px; }
    .chart-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); text-align: center; pointer-events: none; }
    .chart-center strong { font-size: 16px; color: var(--text); font-weight: 700; line-height: 1.2; }
    .cat-legend { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 4px; }
    .cat-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { flex: 1; }
    .cat-amt { font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Balance */
    .balance-section { padding: 10px; }

    /* ── SUMMARY BAR ── */
    .summary-bar { display: flex; gap: 8px; padding: 10px 14px; background: #fff; border-bottom: 1px solid var(--border); }
    .sum-card { flex: 1; min-width: 0; background: var(--bg); border-radius: var(--radius); padding: 10px 14px; }
    .sum-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .sum-val { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; margin: 3px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── CALENDAR ── */
    .cal-day-names { display: grid; grid-template-columns: repeat(7,1fr); padding: 8px 10px 0; }
    .cal-dn { text-align: center; font-size: 10px; font-weight: 600; color: var(--muted); padding: 3px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; padding: 6px 10px 14px; }
    .cal-cell { min-height: 68px; border-radius: 6px; border: 1px solid var(--border); padding: 5px 7px; cursor: pointer; background: #fff; }
    .cal-cell:hover { border-color: var(--primary); background: #f7fbff; }
    .cal-cell.today { border-color: var(--primary); background: #ebf8ff; }
    .cal-cell.empty { background: #f7fafc; cursor: default; border-color: transparent; }
    .cal-num { font-size: 12px; font-weight: 700; }
    .cal-num.sun { color: #e53e3e; }
    .cal-num.sat { color: #3182ce; }
    .cal-total { font-size: 11px; color: #c53030; margin-top: 3px; font-variant-numeric: tabular-nums; font-weight: 600; }
    .cal-items { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.5; }

    /* ── QUICK ADD / TEMPLATE ── */
    .quick-add-panel { padding: 8px 12px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .tmpl-btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 99px; background: #fff; font-size: 12px; cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; transition: border-color .1s; }
    .tmpl-btn:hover { background: #ebf8ff; border-color: var(--primary); color: var(--primary); }
    .tmpl-del { font-size:10px; color:var(--muted); padding:0 2px; line-height:1; cursor:pointer; }
    .tmpl-del:hover { color:#c53030; }

    /* ── PROGRESS / SAVINGS ── */
    .prog-wrap { height: 7px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 99px; }

    /* ── TREND CHART ── */
    .trend-canvas-wrap { padding: 8px 10px 4px; position: relative; height: 140px; }

    /* ── SORT TH ── */
    th[data-action="sortSection"]:hover { background: #edf2f7; color: var(--text); }

    /* ── DRAG & DROP ── */
    .drag-handle { color: #a0aec0; cursor: grab; user-select: none; text-align: center !important; font-size: 15px; padding: 2px 4px !important; }
    .drag-handle:active { cursor: grabbing; }
    tr.dragging td { opacity: 0.3; }
    tr.drag-over td { background: #ebf8ff !important; box-shadow: inset 0 2px 0 var(--primary); }
    .exp-ck { width: 14px; height: 14px; cursor: pointer; accent-color: var(--primary); }

    /* ── LOGIN ── */
    #login-screen { display:none; min-height:100vh; align-items:center; justify-content:center; background:var(--bg); }
    .login-card { background:#fff; border-radius:16px; padding:44px 40px; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.12); max-width:340px; width:90vw; }
    .login-icon { font-size:40px; margin-bottom:14px; }
    .login-title { font-size:22px; font-weight:700; margin-bottom:6px; }
    .login-sub { font-size:13px; color:var(--muted); margin-bottom:28px; line-height:1.6; }
    .login-btn { width:100%; padding:13px 20px; background:#fff; border:1px solid var(--border); border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:box-shadow .15s; }
    .login-btn:hover { box-shadow:0 2px 8px rgba(0,0,0,0.12); }
    .login-error { margin-top:14px; padding:10px 14px; background:#fff5f5; border:1px solid #fed7d7; border-radius:8px; font-size:12px; color:#c53030; display:none; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      /* ヘッダー: 折り返して2段に */
      .header { padding: 8px 10px; gap: 6px; flex-wrap: wrap; height: auto; }
      .header-title { font-size: 14px; }
      .header-nav { margin-left: auto; }
      #header-user-email { display: none; }
      .btn.sm { padding: 4px 8px; font-size: 11px; }

      /* レイアウト */
      .layout { padding: 10px; gap: 10px; }

      /* サマリーバー: 2×2グリッドに */
      .summary-bar { flex-wrap: wrap; padding: 8px; gap: 6px; }
      .sum-card { flex: 0 0 calc(50% - 3px); padding: 8px 10px; }
      .sum-val { font-size: 15px; }

      /* テーブル: カテゴリ・支払方法・口座列を隠す */
      .hide-sp { display: none !important; }
      .show-sp { display: flex !important; }
      td, th { padding: 5px 8px; }

      /* モーダル: 下から出るボトムシートに */
      .modal-bg { align-items: flex-end; }
      .modal-box { width: 100% !important; max-width: 100% !important; border-radius: 16px 16px 0 0 !important; max-height: 90vh; overflow-y: auto; }

      /* カレンダー: セルを小さく */
      .cal-cell { min-height: 46px; padding: 3px 4px; }
      .cal-items { display: none; }
      .cal-total { font-size: 10px; }

      /* パネルヘッダー */
      .panel-header { padding: 8px 12px; }

      /* 入力欄: モバイルで横幅いっぱいに */
      .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
  </style>
</head>

function migrateMonthData(md) {
  if (md.income && md.salary === undefined) {
    md.salary = (md.income.find(r=>r.item==='給料')?.amount) || 0;
    if (md.savingsDeltaPaypay === undefined) md.savingsDeltaPaypay = (md.income.find(r=>r.item==='貯金')?.amount) || 0;
    if (md.savingsDeltaCash   === undefined) md.savingsDeltaCash   = 0;
    md.transfers = md.income
      .filter(r => r.item !== '給料' && r.item !== '貯金' && r.item !== '立替' && (r.amount||0) > 0)
      .map(r => ({ id:uid(), label: r.item + (r.account ? `（${r.account}）` : ''), amount: r.amount }));
    delete md.income;
  }
  if (!md.transfers)              md.transfers    = [];
  if (md.salary    === undefined) md.salary       = 0;
  if (!md.bankInterest)           md.bankInterest = {'楽天銀行':0,'UFJ銀行':0,'Paypay銀行':0,'現金':0};
  md.transfers.forEach(t => {
    if (t.targetAccount === undefined) t.targetAccount = '';
    if (t.fee           === undefined) t.fee           = 0;
  });
  if (md.salaryDate         === undefined) md.salaryDate          = 10;
  if (md.savingsDeltaPaypayDate === undefined) md.savingsDeltaPaypayDate = null;
  if (md.savingsDeltaCashDate   === undefined) md.savingsDeltaCashDate   = null;
  if (!md.confirmedCards)  md.confirmedCards = {};
  if (!md.cardPrepaid)     md.cardPrepaid    = {};
  if (!md.otherIncomes)   md.otherIncomes   = [];
  if (!md.expenses)        md.expenses       = [];
}

function applyRemoteState(s) {
  if (!s || !s.data) return;
  Object.assign(state, s);
  if (!state.initialBalances) state.initialBalances = { miles:0, savingsPaypay:0, savingsCash:0, accounts:{'楽天銀行':0,'UFJ銀行':0} };
  if (!state.initialBalances.accounts) state.initialBalances.accounts = {'楽天銀行':0,'UFJ銀行':0};
  if (!state.templates) state.templates = [];
  Object.values(state.data).forEach(migrateMonthData);
}

// Firebaseがキー順序を変えて返すことがあるため、安定したJSON比較用
function stableJson(v) {
  if (v === null || typeof v !== 'object') return JSON.stringify(v);
  if (Array.isArray(v)) return '[' + v.map(stableJson).join(',') + ']';
  return '{' + Object.keys(v).sort().map(k => JSON.stringify(k) + ':' + stableJson(v[k])).join(',') + '}';
}

function cardTotals(expenses) {
  const t = {};
  expenses.forEach(e => {
    if (!e.payment || e.payment === 'Appleギフト') return;
    t[e.payment] = (t[e.payment]||0) + (e.amount||0);
  });
  return t;
}

function categoryTotals(expenses) {
  const t = {};
  expenses.forEach(e => { t[e.category] = (t[e.category]||0) + (e.amount||0); });
  return t;
}

function totalIncome(income) {
  return income.reduce((s,r) => s+(r.amount||0), 0);
}

function totalExpenses(expenses) {
  return (expenses||[]).reduce((s,r) => s+(r.amount||0), 0);
}

function sectionTotal(expenses, section) {
  return expenses.filter(e=>e.section===section).reduce((s,r)=>s+(r.amount||0),0);
}

// 必要残高 計算: 支払日ごとに各口座の累計必要額を算出
function balanceRows(expenses, cardPrepaid) {
  const ct      = cardTotals(expenses);
  const prepaid = cardPrepaid || {};
  const dayMap  = {}; // day -> account -> amount

  state.cardSettings.forEach(card => {
    if (card.paymentDay === '即時') return;
    const net = (ct[card.name] || 0) - (prepaid[card.name] || 0);
    if (net <= 0) return;
    if (!dayMap[card.paymentDay]) dayMap[card.paymentDay] = {};
    dayMap[card.paymentDay][card.account] = (dayMap[card.paymentDay][card.account]||0) + net;
  });

  const days = Object.keys(dayMap).sort((a,b) => parseInt(a)-parseInt(b));
  return days.map(day => ({ day, accounts: dayMap[day] }));
}

function sortedSection(expenses, section) {
  const st   = sortState[section];
  const rows = expenses.filter(e => e.section === section);
  if (!st.col) return rows;
  return [...rows].sort((a, b) => {
    let va, vb;
    if      (st.col === 'date')     { va = a.date||'9999-99-99'; vb = b.date||'9999-99-99'; }
    else if (st.col === 'item')     { va = a.item||''; vb = b.item||''; }
    else if (st.col === 'category') { va = a.category||''; vb = b.category||''; }
    else if (st.col === 'payment')  { va = a.payment||''; vb = b.payment||''; }
    else if (st.col === 'account')  { va = a.account||''; vb = b.account||''; }
    else if (st.col === 'amount')   { va = a.amount||0; vb = b.amount||0; }
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return st.dir === 'asc' ? cmp : -cmp;
  });
}

function sortTh(section, col, label, extraStyle, cls) {
  const st  = sortState[section];
  const on  = st.col === col;
  const ico = on ? (st.dir === 'asc' ? ' ▲' : ' ▼') : '';
  const color = on ? 'color:var(--primary);' : '';
  return `<th class="${cls||''}" style="cursor:pointer;user-select:none;white-space:nowrap;${color}${extraStyle||''}" data-action="sortSection" data-section="${section}" data-col="${col}">${label}${ico}</th>`;
}

    ? r.totalInstallments - (r.paidInstallments || 0)
    : null;

    ? `<div style="font-size:11px;margin-top:3px;display:flex;align-items:center;gap:4px">
        <span style="background:#e9d8fd;color:#553c9a;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:600;white-space:nowrap">残 ${remaining}回</span>
        <span style="color:var(--muted);font-size:10px">${r.paidInstallments||0}/${r.totalInstallments}回払</span>
       </div>`
    : '';
  return `
    <tr class="data" data-id="${r.id}" data-section="${r.section}">
      <td class="drag-handle" data-drag-handle title="ドラッグして並び替え">⠿</td>
      <td class="muted" style="font-size:11px;white-space:nowrap">${dateDisp}</td>
      <td>
        ${esc(r.item)}
        ${r.memo ? `<div style="font-size:10px;color:var(--muted);margin-top:1px;font-style:italic">${esc(r.memo)}</div>` : ''}
        ${instBadge}
        <div class="show-sp" style="margin-top:2px;display:flex;gap:3px;flex-wrap:wrap">
          ${r.category ? `<span class="chip" data-cat="${esc(r.category)}" style="font-size:10px">${esc(r.category)}</span>` : ''}
          ${r.payment  ? `<span class="chip" data-pay="${esc(r.payment)}"  style="font-size:10px">${esc(r.payment)}</span>`  : ''}
        </div>
      </td>
      <td class="hide-sp"><span class="chip" data-cat="${esc(r.category)}">${esc(r.category)}</span></td>
      <td class="hide-sp">${r.payment ? `<span class="chip" data-pay="${esc(r.payment)}">${esc(r.payment)}</span>` : '<span class="muted">—</span>'}</td>
      <td class="muted hide-sp">${esc(r.account||'')}</td>

        <div class="btn-row">

  `;
}

function renderCardSummary(expenses, md) {
  const ct        = cardTotals(expenses);
  const confirmed = md.confirmedCards || {};
  const prepaid   = md.cardPrepaid   || {};
  const rows = state.cardSettings.flatMap(c => {
    const amt        = ct[c.name] || 0;
    const pre        = prepaid[c.name] || 0;
    const remaining  = amt - pre;
    const over       = c.budget > 0 && amt > c.budget;
    const pct        = c.budget > 0 ? Math.min(100, Math.round(amt/c.budget*100)) : 0;
    const confVal    = confirmed[c.name]; // 数値（確認時の金額）or true(旧) or falsy
    const done       = !!confVal;
    const confAmt    = typeof confVal === 'number' ? confVal : (done ? amt : 0);
    const changed    = done && amt > 0 && confAmt !== amt;
    const diff       = amt - confAmt;
    const rowBg      = changed ? 'background:#fffbeb;' : done ? 'opacity:0.45;' : '';
    const prepaidBg  = changed ? 'background:#fef9c3;' : done ? 'opacity:0.45;' : '';
    return [
      `<tr class="data" style="${rowBg}">
        <td style="width:28px;text-align:center;vertical-align:middle">
          <input type="checkbox" ${done ? 'checked' : ''}
            style="width:15px;height:15px;cursor:pointer;accent-color:#38a169"
            data-action="toggleCardConfirm" data-card="${esc(c.name)}" data-amt="${amt}">
        </td>
        <td style="${done && !changed ? 'text-decoration:line-through' : ''}">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="chip" data-pay="${esc(c.name)}">${esc(c.name)}</span>
            ${changed ? `<span style="background:#fef08a;color:#854d0e;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:700;white-space:nowrap">金額変更</span>` : ''}
            <button class="btn icon" data-action="delCard" data-card="${esc(c.name)}" title="カードを削除" style="font-size:11px;padding:1px 4px;color:#c53030;opacity:0.5">✕</button>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${esc(c.account)} · ${esc(c.paymentDay)}</div>
        </td>
        <td class="r" style="vertical-align:middle">
          <div class="amount ${over?'red':'bold'}" style="font-size:13px">${amt ? fmt(amt) : '<span class="muted">—</span>'}</div>
          ${changed ? `<div style="font-size:10px;color:${diff>0?'#c53030':'#276749'};font-weight:700;text-align:right">確認時比 ${diff>0?'+':''}${fmt(diff)}</div>` : ''}
          ${c.budget ? `<div style="font-size:10px;color:var(--muted);text-align:right">/ ${fmt(c.budget)}</div>` : ''}
          ${c.budget && amt > 0 ? `<div style="margin-top:3px;height:3px;background:#e2e8f0;border-radius:2px"><div style="height:3px;width:${pct}%;background:${over?'#e53e3e':'#4a6fa5'};border-radius:2px"></div></div>` : ''}
        </td>
      </tr>`,
      `<tr class="prepaid-row" style="display:${pre>0?'':'none'};${prepaidBg}">
        <td></td>
        <td style="padding:4px 8px;font-size:11px;color:#2d7a4f;font-weight:600">
          ↳ 先入金（前払い済み額）
        </td>
        <td class="r" style="padding:4px 8px">
          <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">
            <input type="number" value="${pre||''}" placeholder="0" min="0"
              style="width:100px;padding:3px 7px;border:1px solid #68d391;border-radius:5px;font-size:12px;text-align:right;background:#fff;font-weight:600"
              data-action="editCardPrepaid" data-card="${esc(c.name)}">
          </div>
          ${pre > 0 ? `<div style="font-size:12px;font-weight:700;color:#2d7a4f;text-align:right;margin-top:3px">残り ${fmt(remaining)}</div>` : ''}
        </td>
      </tr>`
    ];
  });
  const total        = Object.values(ct).reduce((s,v)=>s+v,0);
  const totalPrepaid = state.cardSettings.reduce((s,c)=>s+(prepaid[c.name]||0),0);
  const doneCount    = state.cardSettings.filter(c=>confirmed[c.name] && ct[c.name]>0).length;
  const totalCount   = state.cardSettings.filter(c=>ct[c.name]>0).length;
  return `
    <table>
      <thead><tr>
        <th style="width:28px"></th>
        <th>支払方法 · 口座 · 支払日</th>
        <th class="r">請求額 / 先入金</th>
      </tr></thead>
      <tbody>
        ${rows.join('')}
        <tr class="sub-row">
          <td></td>
          <td class="muted" style="font-size:11px">
            合計
            ${totalCount > 0 ? `<span style="font-weight:400;color:${doneCount===totalCount?'#38a169':'var(--muted)'}">（${doneCount}/${totalCount} 確認済）</span>` : ''}
          </td>
          <td class="r">
            <div class="amount">${fmt(total)}</div>
            ${totalPrepaid > 0 ? `<div style="font-size:11px;color:#2d7a4f;font-weight:700">残 ${fmt(total - totalPrepaid)}</div>` : ''}
          </td>
        </tr>
      </tbody>
    </table>
  `;
}

function renderCategoryLegend(expenses, prevExpenses) {
  const ct   = categoryTotals(expenses);
  const pct  = categoryTotals(prevExpenses || []);
  const total = totalExpenses(expenses);
  const sorted = CATEGORIES.filter(c=>ct[c]>0).sort((a,b)=>(ct[b]||0)-(ct[a]||0));
  const maxAmt = sorted.length ? ct[sorted[0]] : 1;
  return `
    <div class="cat-legend">
      ${sorted.map(c => {
        const amt  = ct[c];
        const prev = pct[c] || 0;
        const diff = amt - prev;
        const pct_ = maxAmt > 0 ? Math.round(amt / maxAmt * 100) : 0;
        const diffStr = prev > 0
          ? `<span style="font-size:10px;color:${diff>0?'#c53030':diff<0?'#276749':'var(--muted)'}">
               ${diff>0?'▲':'▼'}${fmt(Math.abs(diff))}
             </span>`
          : '';
        return `
          <div style="margin-bottom:6px">
            <div class="cat-row" style="margin-bottom:2px">
              <div class="cat-dot" style="background:${CAT_COLORS[c]||'#ccc'}"></div>
              <span class="cat-name">${esc(c)}</span>
              <span class="cat-amt">${fmt(amt)}</span>
              ${diffStr}
            </div>
            <div style="margin-left:18px;height:3px;background:#e2e8f0;border-radius:99px;overflow:hidden">
              <div style="height:3px;width:${pct_}%;background:${CAT_COLORS[c]||'#ccc'};border-radius:99px"></div>
            </div>
          </div>`;
      }).join('')}
    </div>
  `;
}

function renderBalanceCalc(expenses) {
  const md         = getMonth();
  const prevMonth  = getPrevMonth(state.currentMonth);
  const startBal   = calcAccountBalances(prevMonth);
  const ct         = cardTotals(expenses);
  const prepaid    = md.cardPrepaid || {};

  const events = [];

  // ① 即時カード（PayPay/現金など）― 明細の日付ごとに表示
  state.cardSettings.filter(c => c.paymentDay === '即時').forEach(card => {
    if (!card.account || !(card.account in startBal)) return;
    // 日付ごとに合計
    const byDay = {};
    expenses.forEach(e => {
      if (e.payment !== card.name) return;
      const dayNum = e.date ? +e.date.slice(8, 10) : 0;
      const label  = dayNum ? `${dayNum}日` : '日付未設定';
      if (!byDay[dayNum]) byDay[dayNum] = { dayNum, day: label, total: 0 };
      byDay[dayNum].total += (e.amount || 0);
    });
    // 先入金を先頭日から順に相殺
    let remainPre = prepaid[card.name] || 0;
    Object.values(byDay).sort((a, b) => a.dayNum - b.dayNum).forEach(({ dayNum, day, total }) => {
      const deduct = Math.max(0, total - remainPre);
      remainPre    = Math.max(0, remainPre - total);
      if (deduct > 0) {
        events.push({ dayNum, day, type: 'payment',
          label: card.name, changes: { [card.account]: -deduct } });
      }
    });
  });

  // ② 給料入金
  if ((md.salary || 0) > 0) {
    const day = md.salaryDate || 10;
    events.push({ dayNum: +day, day: `${day}日`, type: 'income',
      label: '給料入金', changes: { '楽天銀行': md.salary } });
  }

  // ③ その他収入
  (md.otherIncomes || []).forEach(i => {
    if ((i.amount || 0) <= 0) return;
    const day    = i.date ? +i.date : null;
    const dayNum = day || 99;
    const acc    = i.account || '楽天銀行';
    if (!(acc in startBal)) return;
    events.push({ dayNum, day: day ? `${day}日` : '日付未設定', type: 'income',
      label: i.label || 'その他収入', changes: { [acc]: i.amount } });
  });

  // ④ 貯金出金（楽天→Paypay）
  if ((md.savingsDeltaPaypay || 0) > 0) {
    const day    = md.savingsDeltaPaypayDate ? +md.savingsDeltaPaypayDate : null;
    const dayNum = day || 99;
    events.push({ dayNum, day: day ? `${day}日` : '日付未設定', type: 'savings',
      label: '貯金（Paypay）', changes: { '楽天銀行': -(md.savingsDeltaPaypay) } });
  }

  // ⑤ 貯金出金（楽天→現金）
  if ((md.savingsDeltaCash || 0) > 0) {
    const day    = md.savingsDeltaCashDate ? +md.savingsDeltaCashDate : null;
    const dayNum = day || 99;
    events.push({ dayNum, day: day ? `${day}日` : '日付未設定', type: 'savings',
      label: '貯金（現金）', changes: { '楽天銀行': -(md.savingsDeltaCash) } });
  }

  // ⑥ 送金
  (md.transfers || []).forEach(t => {
    if ((t.amount || 0) <= 0) return;
    const day    = t.date ? +t.date : null;
    const dayNum = day || 99;
    const fee    = t.fee || 0;
    const chg    = { '楽天銀行': -(t.amount + fee) };
    if (t.targetAccount && (t.targetAccount in startBal))
      chg[t.targetAccount] = (chg[t.targetAccount] || 0) + t.amount;
    const feeStr = fee > 0 ? `（手数料 ${fmt(fee)}）` : '';
    events.push({ dayNum, day: day ? `${day}日` : '日付未設定', type: 'transfer',
      label: (t.label || '送金') + feeStr, changes: chg });
  });

  // ⑦ カード引き落とし（非即時）
  state.cardSettings.filter(c => c.paymentDay !== '即時').forEach(card => {
    const net = (ct[card.name] || 0) - (prepaid[card.name] || 0);
    if (net <= 0 || !card.account || !(card.account in startBal)) return;
    const dayNum = parseInt(card.paymentDay) || 99;
    events.push({ dayNum, day: card.paymentDay, type: 'payment',
      label: card.name, changes: { [card.account]: -net } });
  });

  // 日付順にソート（同日：入金→送金→貯金→引き落とし）
  const typeOrder = { income: 0, transfer: 1, savings: 2, payment: 3 };
  events.sort((a, b) => a.dayNum !== b.dayNum
    ? a.dayNum - b.dayNum
    : (typeOrder[a.type] || 0) - (typeOrder[b.type] || 0));

  // 表示する口座を収集
  const accsSet = new Set();
  events.forEach(ev => Object.keys(ev.changes).forEach(a => { if (a in startBal) accsSet.add(a); }));
  const allAccounts = [...accsSet];
  if (!allAccounts.length)
    return '<div style="padding:12px;color:var(--muted);font-size:12px;text-align:center">データなし</div>';

  let running = {};
  allAccounts.forEach(a => running[a] = startBal[a] || 0);

  const rowsHtml = events.map(ev => {
    allAccounts.forEach(a => { running[a] = (running[a] || 0) + (ev.changes[a] || 0); });
    const snap     = { ...running };
    const isIncome = ev.type === 'income';
    const anyNeg   = allAccounts.some(a => snap[a] < 0);
    const bg       = isIncome ? '#f0fff4' : anyNeg ? '#fff5f5' : '';
    const labelColor = isIncome ? '#276749' : ev.type === 'transfer' ? '#2b6cb0' : '#c53030';
    const arrow    = isIncome ? '↑' : '↓';
    return `
      <tr class="data" style="background:${bg}">
        <td style="font-size:11px">
          <div style="font-weight:600;color:${isIncome ? '#276749' : 'var(--muted)'}">
            ${esc(ev.day)}
          </div>
          <div style="font-size:10px;color:${labelColor}">${arrow} ${esc(ev.label)}</div>
        </td>
        ${allAccounts.map(a => `
          <td class="r amount bold" style="font-size:12px;color:${snap[a] < 0 ? '#e53e3e' : snap[a] < 50000 ? '#c05621' : ''}">
            ${fmt(snap[a])}
          </td>`).join('')}
      </tr>`;
  }).join('');

  return `
    <table>
      <thead><tr>
        <th>日付・イベント</th>
        ${allAccounts.map(a => `<th class="r" style="font-size:10px">${esc(a)}</th>`).join('')}
      </tr></thead>
      <tbody>
        <tr style="background:#f0f4f8">
          <td style="font-size:11px;font-weight:700;color:var(--muted)">前月末残高</td>
          ${allAccounts.map(a => `<td class="r amount bold" style="font-size:12px;color:var(--muted)">${fmt(startBal[a] || 0)}</td>`).join('')}
        </tr>
        ${rowsHtml}
      </tbody>
    </table>
    <div style="padding:6px 10px 8px;font-size:10px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap">
      <span><span style="color:#276749">↑</span> 入金</span>
      <span><span style="color:#c05621">■</span> 5万円未満</span>
      <span><span style="color:#e53e3e">■</span> マイナス</span>
      <span style="color:var(--muted)">※日付未設定は月末扱い</span>
    </div>
  `;
}

// ── カレンダービュー ──
function renderCalendar(expenses, ym) {
  const y = +ym.slice(0,4), m = +ym.slice(4,6);
  const firstDow  = new Date(y, m-1, 1).getDay();
  const daysInMon = new Date(y, m, 0).getDate();
  const today     = new Date();
  const isCurMon  = today.getFullYear()===y && today.getMonth()+1===m;
  const mStr      = `${y}-${String(m).padStart(2,'0')}-`;

  // 全月データから「この月に日付が入っている支出」を収集
  const byDay = {};
  Object.values(state.data).forEach(md => {
    (md.expenses||[]).forEach(e => {
      if (!e.date || !e.date.startsWith(mStr)) return;
      const d = +e.date.slice(8,10);
      if (!byDay[d]) byDay[d] = [];
      byDay[d].push(e);
    });
  });

  const DNAMES = ['日','月','火','水','木','金','土'];
  let cells = Array.from({length: firstDow}, ()=>'<div class="cal-cell empty"></div>');

  for (let d = 1; d <= daysInMon; d++) {
    const dow      = (firstDow + d - 1) % 7;
    const dayExps  = byDay[d] || [];
    const dayTotal = dayExps.reduce((s,e)=>s+(e.amount||0),0);
    const isToday  = isCurMon && d===today.getDate();
    const preview  = dayExps.slice(0,3).map(e=>esc(e.item)).join('・');
    const more     = dayExps.length > 3 ? `<span style="color:var(--primary)"> +${dayExps.length-3}</span>` : '';
    const dd       = String(d).padStart(2,'0');
    cells.push(`
      <div class="cal-cell ${isToday?'today':''}" data-action="calDay" data-date="${y}-${String(m).padStart(2,'0')}-${dd}">
        <div class="cal-num ${dow===0?'sun':dow===6?'sat':''}">${d}</div>
        ${dayTotal > 0 ? `<div class="cal-total">${fmt(dayTotal)}</div>` : ''}
        ${preview ? `<div class="cal-items">${preview}${more}</div>` : ''}
      </div>
    `);
  }

  const datedCount = Object.values(byDay).reduce((s,arr)=>s+arr.length, 0);
  return `
    <div class="panel">
      <div class="panel-header gray">
        <span>📅 ${y}年${m}月</span>
        <span style="font-size:11px;font-weight:400;color:var(--muted)">${datedCount}件に日付あり</span>
      </div>
      <div class="cal-day-names">
        ${DNAMES.map((d,i)=>`<div class="cal-dn" style="${i===0?'color:#e53e3e':i===6?'color:#3182ce':''}">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">${cells.join('')}</div>
    </div>
  `;
}

// ── 累積残高計算 ──
function calcBalance(upToMonth) {
  const init = state.initialBalances || { miles:0, savingsPaypay:0, savingsCash:0 };
  let miles = init.miles || 0;
  let sp    = init.savingsPaypay || 0;
  let sc    = init.savingsCash   || 0;
  for (const m of Object.keys(state.data).sort()) {
    if (m > upToMonth) break;
    const d = state.data[m];
    miles += d.mileDelta          || 0;
    sp    += d.savingsDeltaPaypay || 0;
    sc    += d.savingsDeltaCash   || 0;
  }
  return { miles, savingsPaypay: sp, savingsCash: sc };
}

// ── 口座残高自動計算 ──
function calcAccountBalances(upToMonth) {
  const init = state.initialBalances || {};
  const ac   = init.accounts || {};
  const bal  = {
    '楽天銀行':   ac['楽天銀行']  || 0,
    'UFJ銀行':    ac['UFJ銀行']   || 0,
    'Paypay銀行': init.savingsPaypay || 0,
    '現金':       init.savingsCash   || 0,
  };
  for (const m of Object.keys(state.data).sort()) {
    if (m > upToMonth) break;
    const d = state.data[m];
    bal['楽天銀行'] += d.salary || 0;
    (d.otherIncomes||[]).forEach(i => { const acc = i.account || '楽天銀行'; if (acc in bal) bal[acc] += i.amount || 0; });
    if (d.bankInterest) Object.entries(d.bankInterest).forEach(([k,v]) => { if (k in bal) bal[k] += v||0; });
    const sp = d.savingsDeltaPaypay || 0;
    bal['楽天銀行']   -= sp; bal['Paypay銀行'] += sp;
    const sc = d.savingsDeltaCash || 0;
    bal['楽天銀行']   -= sc; bal['現金']        += sc;
    (d.transfers||[]).forEach(t => {
      bal['楽天銀行'] -= (t.amount || 0) + (t.fee || 0);
      if (t.targetAccount && t.targetAccount in bal) bal[t.targetAccount] += t.amount || 0;
    });
    (d.expenses||[]).forEach(e => { if (e.account && e.account in bal) bal[e.account] -= e.amount || 0; });
    // 先入金は前月に振替で出金済み → 当月カード費用から相殺して二重計上を防ぐ
    Object.entries(d.cardPrepaid||{}).forEach(([cardName, pre]) => {
      const card = state.cardSettings.find(c => c.name === cardName);
      if (card && card.account && card.account in bal) bal[card.account] += pre || 0;
    });
  }
  return bal;
}

const ACC_KEYS = ['楽天銀行','UFJ銀行','Paypay銀行','現金'];

function refreshAccountBals() {
  const bals = calcAccountBalances(state.currentMonth);
  ACC_KEYS.forEach((k, i) => {
    const el = document.getElementById('acc-bal-' + i);
    if (el) el.textContent = fmt(bals[k]);
  });
}

// ── ANAマイルパネル ──
function renderAnaMiles(md) {
  const [y, m] = [+state.currentMonth.slice(0,4), +state.currentMonth.slice(4,6)];
  const bal     = calcBalance(state.currentMonth);
  const prevKey = `${m===1?y-1:y}${String(m===1?12:m-1).padStart(2,'0')}`;
  const prevBal = calcBalance(prevKey);
  const diff    = bal.miles - prevBal.miles;

  const points = [];
  for (let i = 4; i >= 0; i--) {
    let my = y, mm = m - i;
    while (mm <= 0) { mm += 12; my--; }
    const b = calcBalance(`${my}${String(mm).padStart(2,'0')}`);
    points.push({ label:`${mm}月`, miles: b.miles });
  }
  const maxMi    = Math.max(...points.map(p=>p.miles), 1);
  const hasTrend = points.some(p=>p.miles>0);
  const init     = state.initialBalances;

  return `
    <div class="panel">
      <div class="panel-header" style="background:#fffbeb;color:#744210"><span>✈ ANAマイル</span></div>
      <div style="padding:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">

            <div style="font-size:10px;color:var(--muted);margin-bottom:3px">今月増減</div>

              data-action="editAnaMiles">
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:${hasTrend?'10px':'4px'}">
          <span style="color:var(--muted)">前月比</span>
          <span style="font-weight:600;color:${diff>0?'#276749':diff<0?'#c53030':'var(--muted)'}">
            ${diff>=0?'+':''}${diff.toLocaleString('ja-JP')} マイル
          </span>
        </div>
        ${hasTrend ? `
          <div style="display:flex;gap:3px;align-items:flex-end;height:44px;margin-bottom:10px">
            ${points.map(p=>`
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">

// ── 月次推移チャート ──
function getMonthTrend(n) {
  const [y, m] = [+state.currentMonth.slice(0,4), +state.currentMonth.slice(4,6)];
  const result = [];
  for (let i = n-1; i >= 0; i--) {
    let my = y, mm = m - i;
    while (mm <= 0) { mm += 12; my--; }
    const key = `${my}${String(mm).padStart(2,'0')}`;
    const d = state.data[key];
    result.push({
      label:    `${mm}月`,
      income:   d ? (d.salary||0) : 0,
      expenses: d ? totalExpenses(d.expenses) : 0,
      savings:  d ? ((d.savingsDeltaPaypay||0) + (d.savingsDeltaCash||0)) : 0,
    });
  }
  return result;
}

// ── 並び替え ──
function reorderExp(srcId, tgtId) {
  const md  = getMonth();
  const src = md.expenses.findIndex(r => r.id === srcId);
  const tgt = md.expenses.findIndex(r => r.id === tgtId);
  if (src < 0 || tgt < 0 || src === tgt) return;
  if (md.expenses[src].section !== md.expenses[tgt].section) return;
  // ソートをリセットしてドラッグ順を優先
  sortState[md.expenses[src].section] = { col: null, dir: 'asc' };
  const [item] = md.expenses.splice(src, 1);
  md.expenses.splice(tgt, 0, item);
  saveState();
  render();
}

function renderPaymentCalendar(expenses, md) {
  const ct      = cardTotals(expenses);
  const prepaid = md.cardPrepaid   || {};
  const confirmed = md.confirmedCards || {};
  const cards = state.cardSettings
    .filter(c => ct[c.name] > 0)
    .map(c => ({ ...c, billAmt: ct[c.name], pre: prepaid[c.name]||0, done: !!confirmed[c.name] }))
    .sort((a,b) => {
      const da = a.paymentDay==='即時' ? 0 : parseInt(a.paymentDay)||99;
      const db = b.paymentDay==='即時' ? 0 : parseInt(b.paymentDay)||99;
      return da - db;
    });
  if (!cards.length) return '<div style="padding:12px;font-size:12px;color:var(--muted);text-align:center">支払いなし</div>';
  const rows = cards.map(c => {
    const net = c.billAmt - c.pre;
    return `
      <tr class="data" style="${c.done?'opacity:0.4':''}">
        <td style="font-size:12px;color:var(--muted);white-space:nowrap;width:38px">${esc(c.paymentDay)}</td>
        <td><span class="chip" data-pay="${esc(c.name)}">${esc(c.name)}</span></td>
        <td class="r amount" style="font-size:12px">
          ${fmt(net)}
          ${c.pre > 0 ? `<div style="font-size:10px;color:#2d7a4f">先入金 ${fmt(c.pre)}済</div>` : ''}
        </td>
      </tr>`;
  });
  const total = cards.reduce((s,c)=>s+(c.billAmt-c.pre),0);
  return `
    <table>
      <thead><tr><th>支払日</th><th>カード</th><th class="r">残額</th></tr></thead>
      <tbody>
        ${rows.join('')}
        <tr class="sub-row"><td colspan="2" class="muted" style="font-size:11px">合計</td><td class="r amount">${fmt(total)}</td></tr>
      </tbody>
    </table>`;
}

async function callGeminiVision(base64, mimeType) {
  if (!GEMINI_API_KEY) throw new Error('GEMINI_API_KEY が設定されていません（ファイル上部を確認）');

  const today = new Date().toISOString().slice(0, 10);
  const year  = new Date().getFullYear();
  const prompt = `この画像はクレジットカードアプリの明細画面またはレシートです。
支出情報を抽出し、JSONのみで回答してください（説明文不要）。

{"items":[{"date":"YYYY-MM-DD","item":"品名・店名","amount":金額整数,"payment":"支払方法"}]}

- 日付不明→今日(${today})、年のみ不明→${year}年
- amountは円の整数（記号・カンマなし）
- paymentは不明なら空文字
- 合計行・キャンセル行は除く
- 複数明細はすべて含める`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [
          { text: prompt },
          { inline_data: { mime_type: mimeType, data: base64 } }
        ]}],
        generationConfig: { temperature: 0 }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }
  const data  = await res.json();
  const text  = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('AIの応答を解析できませんでした');
  const parsed = JSON.parse(match[0]);
  return (parsed.items || []).filter(i => (i.amount || 0) > 0);
}

  { cat:'交通費',        kw:['タクシー','icoca','ICOCA','suica','Suica','PASMO','新幹線','エクスプレス予約','駐車','ＪＲ','JR','鉄道','バス','乗車'] },
  { cat:'通信費',        kw:['docomo','au','SoftBank','softbank','楽天モバイル','iCloud','Gmail','通信','携帯','スマホ','chargespot','ANA pocket','Pontaパス'] },
  { cat:'推し活費',      kw:['NETFLIX','Netflix','ニコニコ','ニコ動','TWICE','ライブ','コンサート','easpa','EASPA','ピッコマ'] },
  { cat:'書籍・試験費',  kw:['書籍','本屋','ブックオフ','試験','chatGPT','ChatGPT','Claude','シーモ','abceed','フォーサイト','転職会議','インスタベース','星ひとみ','メジャーアプリ'] },
  { cat:'美容費',        kw:['SHEIN','shein','美容院','コスメ','化粧','エステ','ネイル','薬局','ドラッグ','マツキヨ'] },
  { cat:'医療費',        kw:['医療','クリニック','病院','歯科','調剤'] },
  { cat:'日用品費',      kw:['ドン・キホーテ','ドンキ','ダイソー','ニトリ','ホームセンター','ジャパン','スーパー','イオン'] },
  { cat:'趣味費',        kw:['Youtube','AmazonMusic','Amazon Music','ゲーム'] },
  { cat:'交際費',        kw:['飲み','会食','誕生日','ディズニー','東京ディズニー'] },
];

function suggestCat(desc) {
  const d = desc||'';
  for (const rule of CAT_KEYWORDS) {
    for (const kw of rule.kw) {
      if (d.toLowerCase().includes(kw.toLowerCase())) return rule.cat;
    }
  }
  return 'その他';
}

function parseCSVText(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    const cols = [];
    let inQ = false, cur = '';
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += line[i]; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

function parseAmt(s) {
  const n = parseFloat(String(s||'').replace(/[¥￥,\s]/g,''));
  return isNaN(n) ? 0 : Math.round(Math.abs(n));
}

function parseDate(s) {
  if (!s) return null;
  s = String(s).trim();
  let m;
  // YYYY/MM/DD or YYYY-MM-DD
  m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  // YYYY年M月D日
  m = s.match(/^(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  // YYYYMMDD
  m = s.match(/^(\d{8})$/);
  if (m) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  // MM/DD or M/D （年は現在の月から補完）
  m = s.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if (m) return `${state.currentMonth.slice(0,4)}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  return null;
}

// 「なし」オプション付きセレクター
function colOptsOpt(headers, sel) {
  return `<option value="-1" ${sel===-1?'selected':''}>（なし）</option>` +
    headers.map((h,i)=>`<option value="${i}" ${i===sel?'selected':''}>${esc(h||('列'+(i+1)))}</option>`).join('');
}

function readFileEnc(file, enc) {
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = e => res(new TextDecoder(enc).decode(e.target.result));
    fr.onerror = rej;
    fr.readAsArrayBuffer(file);
  });
}

function bindImpEvents() {
  const updateCount = () => {
    const n = impState.preview.filter(r=>r.selected).length;
    const btn = document.getElementById('imp-do');
    if (btn) btn.textContent = `取り込む（${n}件）`;
    const sum = document.getElementById('imp-summary');
    if (sum) sum.innerHTML = `${impState.preview.length}件中 <strong style="color:var(--text)">${n}件</strong> を取り込み予定`;
    const all = document.getElementById('imp-all');
    if (all) all.checked = n === impState.preview.length;
  };
  document.getElementById('imp-all')?.addEventListener('change', e => {
    impState.preview.forEach(r => r.selected = e.target.checked);
    document.querySelectorAll('.imp-ck').forEach(c => c.checked = e.target.checked);
    updateCount();
  });
  document.querySelectorAll('.imp-ck').forEach(c => c.addEventListener('change', e => {
    impState.preview[+e.target.dataset.i].selected = e.target.checked;
    updateCount();
  }));
  document.querySelectorAll('.imp-cat').forEach(s => s.addEventListener('change', e => {
    impState.preview[+e.target.dataset.i].category = e.target.value;
  }));
  document.querySelectorAll('.imp-sec').forEach(s => s.addEventListener('change', e => {
    impState.preview[+e.target.dataset.i].section = e.target.value;
  }));
}

function handleClick(e) {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  if (action === 'prevMonth') {
    const [y,m] = [+state.currentMonth.slice(0,4), +state.currentMonth.slice(4)];
    state.currentMonth = m===1 ? `${y-1}12` : `${y}${String(m-1).padStart(2,'0')}`;
    saveState(); render();
  }
  else if (action === 'nextMonth') {
    const [y,m] = [+state.currentMonth.slice(0,4), +state.currentMonth.slice(4)];
    state.currentMonth = m===12 ? `${y+1}01` : `${y}${String(m+1).padStart(2,'0')}`;
    const md = getMonth(); // creates empty if not exists
    // Copy fixed+installment from previous month if new
    const prevKey = m===12 ? `${y}12` : `${y}${String(m).padStart(2,'0')}`;
    const hasCarryover = state.data[state.currentMonth].expenses.some(e => e.section === 'fixed' || e.section === 'installment');
    if (!hasCarryover && state.data[prevKey]) {
      const prev = state.data[prevKey].expenses.filter(e=>e.section==='fixed'||e.section==='installment');
      state.data[state.currentMonth].expenses = prev.map(e => {
        if (e.section === 'installment' && e.totalInstallments) {
          const newPaid = (e.paidInstallments || 0) + 1;
          if (newPaid > e.totalInstallments) return null; // 完済済み → コピーしない
          return { ...e, id: uid(), paidInstallments: newPaid };
        }
        return { ...e, id: uid() };
      }).filter(Boolean);
    }
    saveState(); render();
  }
  else if (action === 'addIncome') {
    const md = getMonth();
    if (!md.otherIncomes) md.otherIncomes = [];
    md.otherIncomes.push({ id:uid(), label:'', amount:0, account:'楽天銀行', date:null });
    saveState(); render();
  }
  else if (action === 'delIncome') {
    const md = getMonth();
    md.otherIncomes = (md.otherIncomes||[]).filter(i=>i.id!==el.dataset.id);
    saveState(); render();
  }
  else if (action === 'addTransfer') {
    const md = getMonth();
    if (!md.transfers) md.transfers = [];
    md.transfers.push({ id:uid(), label:'送金', amount:0, fee:0, date:null });
    saveState(); render();
  }
  else if (action === 'delTransfer') {
    const md = getMonth();
    md.transfers = (md.transfers||[]).filter(t=>t.id!==el.dataset.id);
    saveState(); render();
  }
  else if (action === 'addExp') {
    showModal(expModalHtml(null, el.dataset.section));
  }
  else if (action === 'editExp') {
    const r = getMonth().expenses.find(r=>r.id===el.dataset.id);
    if (r) showModal(expModalHtml(r, null));
  }
  else if (action === 'delExp') {
    if (!confirm('この支出を削除しますか？')) return;
    const md = getMonth();
    md.expenses = md.expenses.filter(r=>r.id!==el.dataset.id);
    selectedExpIds.delete(el.dataset.id);
    saveState(); render();
  }
  else if (action === 'mergeExp') {
    showMergeModal(el.dataset.section);
  }
  else if (action === 'saveMerge') {
    const sec      = el.dataset.section;
    const md       = getMonth();
    const selected = md.expenses.filter(e => e.section === sec && selectedExpIds.has(e.id));
    if (selected.length < 2) return;
    const item = document.getElementById('mg-item').value.trim();
    if (!item) { alert('名前を入力してください'); return; }
    const total    = selected.reduce((s, e) => s + (e.amount || 0), 0);
    const firstIdx = md.expenses.findIndex(e => e.section === sec && selectedExpIds.has(e.id));
    const firstDate = selected.map(e => e.date).filter(Boolean).sort()[0] || null;
    const merged = {
      id:       uid(),
      section:  sec,
      date:     firstDate,
      item,
      category: document.getElementById('mg-category').value,
      payment:  document.getElementById('mg-payment').value  || null,
      account:  document.getElementById('mg-account').value  || null,
      amount:   total,
    };
    const delIds = new Set(selected.map(e => e.id));
    md.expenses = md.expenses.filter(e => !delIds.has(e.id));
    md.expenses.splice(firstIdx, 0, merged);
    selected.forEach(e => selectedExpIds.delete(e.id));
    saveState(); closeModal(); render();
  }
  else if (action === 'bulkDelete') {
    const sec     = el.dataset.section;
    const md      = getMonth();
    const delIds  = new Set([...selectedExpIds].filter(id => md.expenses.find(e => e.id === id && e.section === sec)));
    if (!delIds.size) return;
    if (!confirm(`${delIds.size}件の支出を削除しますか？`)) return;
    delIds.forEach(id => selectedExpIds.delete(id));
    md.expenses = md.expenses.filter(e => !delIds.has(e.id));
    saveState(); render();
  }
  else if (action === 'saveExp') {
    const md = getMonth();
    const id = el.dataset.id;
    const pay = document.getElementById('m-payment').value;
    const sec = document.getElementById('m-section').value;
    const rec = {
      id:       id || uid(),
      date:     document.getElementById('m-date')?.value || null,
      section:  sec,
      item:     document.getElementById('m-item').value.trim(),
      category: document.getElementById('m-category').value,
      payment:  pay || null,
      account:  document.getElementById('m-account').value || null,
      amount:   +document.getElementById('m-amount').value || 0,
      totalInstallments: sec === 'installment' ? (+document.getElementById('m-total-inst').value || null) : null,
      paidInstallments:  sec === 'installment' ? (+document.getElementById('m-paid-inst').value  || 0)    : null,
      memo: document.getElementById('m-memo')?.value.trim() || null,
    };
    if (!rec.item) { alert('明細を入力してください'); return; }
    if (id) {
      const i = md.expenses.findIndex(r=>r.id===id);
      if (i>=0) md.expenses[i] = rec;
    } else {
      md.expenses.push(rec);
    }
    saveState(); closeModal(); render();
  }
  else if (action === 'sortSection') {
    const sec = el.dataset.section;
    const col = el.dataset.col;
    const st  = sortState[sec];
    if (st.col === col) {
      if (st.dir === 'asc') { st.dir = 'desc'; }
      else { st.col = null; st.dir = 'asc'; }
    } else {
      st.col = col; st.dir = 'asc';
    }
    render();
  }
  else if (action === 'toggleCalView') { calView = !calView; render(); }
  else if (action === 'calDay') {
    const date = el.dataset.date;
    const md   = getMonth();
    const exps = md.expenses.filter(e=>e.date===date);
    if (!exps.length) return;
    const [,, dd] = date.split('-');
    const rows = exps.map(e=>`
      <tr class="data">
        <td>${esc(e.item)}</td>
        <td><span class="chip" data-cat="${esc(e.category)}">${esc(e.category)}</span></td>
        <td class="r amount">${fmt(e.amount)}</td>
      </tr>
    `).join('');
    const dayTotal = exps.reduce((s,e)=>s+(e.amount||0),0);
    showModal(`
      <div class="modal-box" data-action="noop">
        <div class="modal-title">${+dd}日の支出</div>
        <table style="margin-bottom:12px">
          <thead><tr><th>明細</th><th>カテゴリ</th><th class="r">金額</th></tr></thead>
          <tbody>${rows}
            <tr class="sub-row"><td colspan="2" class="r muted" style="font-size:11px">合計</td><td class="r amount">${fmt(dayTotal)}</td></tr>
          </tbody>
        </table>
        <div class="modal-footer">
          <button class="btn primary" data-action="closeModal">閉じる</button>
        </div>
      </div>
    `);
  }
  else if (action === 'signOut') {
    if (!confirm('ログアウトしますか？')) return;
    fbAuth.signOut();
  }
  else if (action === 'editAnaMiles') {
    /* handled in handleInput */
  }
  else if (action === 'openScreenshot') { openScreenshotModal(); }
  else if (action === 'ssConfirm') {
    const payment = document.getElementById('ss-payment')?.value || '';
    const account = PAY_ACCOUNT[payment] || null;
    const md      = getMonth();
    let added     = 0;

    document.querySelectorAll('[data-ss-idx]').forEach(cb => {
      if (!cb.checked) return;
      const i   = +cb.dataset.ssIdx;
      const it  = ssItems[i];
      if (!it) return;
      const item   = document.querySelector(`[data-ss-item="${i}"]`)?.value.trim() || it.item;
      const amount = +(document.querySelector(`[data-ss-amt="${i}"]`)?.value) || it.amount;
      const cat    = document.querySelector(`[data-ss-cat="${i}"]`)?.value || it.category;
      md.expenses.push({
        id: uid(), section: 'variable',
        date:     it.date || null,
        item, category: cat, amount,
        payment:  payment || it.payment || '',
        account:  account || it.account || null,
      });
      added++;
    });

    if (!added) { alert('追加する項目を選択してください'); return; }
    saveState(); closeModal(); render();
    ssItems = [];
  }
  else if (action === 'openImport') { openImportModal(); }
  else if (action === 'impStep1') {
    const fi = document.getElementById('imp-file');
    if (!fi?.files.length) { alert('ファイルを選択してください'); return; }
    const enc    = document.getElementById('imp-enc').value;
    const hasHdr = document.getElementById('imp-hdr').value === '1';
    readFileEnc(fi.files[0], enc).then(txt => {
      const allRows = parseCSVText(txt);
      if (!allRows.length) { alert('データを読み込めませんでした'); return; }
      impState.headers = hasHdr ? allRows[0] : allRows[0].map((_,i)=>'列'+(i+1));
      impState.rows    = (hasHdr ? allRows.slice(1) : allRows).filter(r=>r.some(c=>c));
      const h = impState.headers.map(x=>(x||'').toLowerCase());
      impState.descCol = h.findIndex(x=>x.includes('店')||x.includes('利用先')||x.includes('明細')||x.includes('商品')||x.includes('摘要'));
      impState.amtCol  = h.findIndex(x=>x.includes('金額')||x.includes('amount'));
      impState.dateCol = h.findIndex(x=>x.includes('日付')||x.includes('利用日')||x.includes('年月日')||x.includes('date'));
      if (impState.descCol < 0) impState.descCol = 1;
      if (impState.amtCol  < 0) impState.amtCol  = 2;
      impState.step = 2;
      renderImpModal();
    }).catch(()=>alert('ファイル読み込みに失敗しました'));
  }
  else if (action === 'impStep2') {
    const descCol = +document.getElementById('imp-desc').value;
    const amtCol  = +document.getElementById('imp-amt').value;
    const dateCol = +document.getElementById('imp-date').value;
    const payment = document.getElementById('imp-pay').value;
    const section = document.getElementById('imp-sec').value;
    const account = PAY_ACCOUNT[payment]||null;
    impState.descCol = descCol;
    impState.amtCol  = amtCol;
    impState.dateCol = dateCol;
    impState.preview = impState.rows
      .map(r => {
        const item   = (r[descCol]||'').trim();
        const amount = parseAmt(r[amtCol]);
        if (!item || !amount) return null;
        const date = dateCol >= 0 ? parseDate(r[dateCol]) : null;
        return { item, amount, date, category:suggestCat(item), section, payment, account, selected:true };
      })
      .filter(Boolean);
    if (!impState.preview.length) { alert('有効なデータが見つかりませんでした\n（明細・金額が空の行は除外されます）'); return; }
    impState.step = 3;
    renderImpModal();
  }
  else if (action === 'impConfirm') {
    const toAdd = impState.preview.filter(r=>r.selected);
    if (!toAdd.length) { alert('取り込む行が選択されていません'); return; }
    const md = getMonth();
    toAdd.forEach(r => md.expenses.push({ id:uid(), section:r.section, date:r.date||null, item:r.item, category:r.category, payment:r.payment, account:r.account, amount:r.amount }));
    saveState(); closeModal(); render();
    impState = null;
  }
  else if (action === 'addCard') {
    showModal(`
      <div class="modal-box" data-action="noop">
        <div class="modal-title">カードを追加</div>
        <div class="field">
          <label>カード名</label>
          <input id="nc-name" type="text" placeholder="例: 三井住友カード">
        </div>
        <div class="field-row">
          <div class="field">
            <label>引き落とし口座</label>
            <select id="nc-account">
              ${ACC_KEYS.map(a=>`<option value="${a}">${a}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>支払日</label>
            <input id="nc-day" type="text" placeholder="27日 / 即時">
          </div>
        </div>
        <div class="field">
          <label>月間予算（任意）</label>
          <input id="nc-budget" type="number" placeholder="0" style="text-align:right">
        </div>
        <div class="modal-footer">
          <button class="btn" data-action="closeModal">キャンセル</button>
          <button class="btn primary" data-action="saveNewCard">追加</button>
        </div>
      </div>
    `);
    return;
  }
  else if (action === 'saveNewCard') {
    const name   = document.getElementById('nc-name')?.value.trim();
    const account= document.getElementById('nc-account')?.value || '楽天銀行';
    const day    = document.getElementById('nc-day')?.value.trim() || '—';
    const budget = +document.getElementById('nc-budget')?.value || 0;
    if (!name) { alert('カード名を入力してください'); return; }
    if ((state.cardSettings||[]).find(c => c.name === name)) { alert('同じ名前のカードが既に存在します'); return; }
    if (!state.cardSettings) state.cardSettings = [];
    state.cardSettings.push({ id: uid(), name, account, paymentDay: day, budget });
    saveState(); closeModal(); render();
    return;
  }
  else if (action === 'delCard') {
    const name = el.dataset.card;
    if (!confirm(`「${name}」をカード一覧から削除しますか？\n（支出データは残ります）`)) return;
    state.cardSettings = state.cardSettings.filter(c => c.name !== name);
    saveState(); render();
    return;
  }
  else if (action === 'togglePrepaid') {
    const panel = el.closest('.panel');
    const rows  = panel.querySelectorAll('tr.prepaid-row');
    const visible = rows[0]?.style.display !== 'none';
    rows.forEach(r => r.style.display = visible ? 'none' : '');
    el.textContent = visible ? '先入金を入力' : '先入金を閉じる';
    el.style.color  = visible ? '' : '#276749';
    el.style.borderColor = visible ? '' : '#68d391';
    return;
  }
  else if (action === 'saveTmpl') {
    const item = document.getElementById('m-item')?.value.trim();
    if (!item) { alert('明細を入力してください'); return; }
    if (!state.templates) state.templates = [];
    state.templates.push({
      id:       uid(),
      label:    item,
      section:  document.getElementById('m-section')?.value || 'variable',
      item,
      category: document.getElementById('m-category')?.value || '',
      payment:  document.getElementById('m-payment')?.value  || null,
      account:  document.getElementById('m-account')?.value  || null,
      amount:   +document.getElementById('m-amount')?.value  || 0,
    });
    saveState(); closeModal(); render();
    showToast(`「${item}」をテンプレートに保存しました`);
  }
  else if (action === 'applyTmpl') {
    const t = (state.templates||[]).find(t=>t.id===el.dataset.id);
    if (t) showModal(expModalHtml({ ...t, id:null, date:'' }, null));
  }
  else if (action === 'delTmpl') {
    const id = el.dataset.id;
    state.templates = (state.templates||[]).filter(t=>t.id!==id);
    saveState(); render();
  }
  else if (action === 'copyNextMonth') {
    const md  = getMonth();
    const exp = md.expenses.find(r => r.id === el.dataset.id);
    if (!exp) return;
    const [y, m] = [+state.currentMonth.slice(0,4), +state.currentMonth.slice(4)];
    const nextKey = m === 12 ? `${y+1}01` : `${y}${String(m+1).padStart(2,'0')}`;
    if (!state.data[nextKey]) state.data[nextKey] = emptyMonth();
    const nextMd = state.data[nextKey];
    let newExp;
    if (exp.section === 'installment' && exp.totalInstallments) {
      const newPaid = (exp.paidInstallments || 0) + 1;
      if (newPaid > exp.totalInstallments) {
        showToast('完済済みのため翌月にはコピーしません');
        return;
      }
      newExp = { ...exp, id: uid(), paidInstallments: newPaid };
    } else {
      newExp = { ...exp, id: uid() };
    }
    nextMd.expenses.push(newExp);
    saveState();
    const label = `${+nextKey.slice(0,4)}年${+nextKey.slice(4)}月`;
    showToast(`${label} にコピーしました`);
  }
  else if (action === 'noop') { /* modal-box クリックは何もしない */ }
  else if (action === 'closeModal') {
    // バックドロップ(.modal-bg)の直接クリック時のみ閉じる
    if (el.classList.contains('modal-bg') && e.target !== el) return;
    closeModal();
  }
}

function calcIncomeNums(md) {
  const otherIncomeTotal = (md.otherIncomes||[]).reduce((s,i)=>s+(i.amount||0),0);
  const totalIncome  = (md.salary||0) + otherIncomeTotal;
  const deductions   = (md.savingsDeltaPaypay||0) + (md.savingsDeltaCash||0) + (md.transfers||[]).reduce((s,t)=>s+(t.amount||0)+(t.fee||0),0);
  const takehome     = totalIncome - deductions;
  const balance      = takehome - totalExpenses(md.expenses);
  return { deductions, takehome, balance };
}

function updateIncomeDisplay(deductions, takehome, balance) {
  const ed = document.getElementById('inc-deductions');
  const et = document.getElementById('inc-takehome');
  const st = document.getElementById('sum-takehome');
  const sb = document.getElementById('sum-balance');
  if (ed) ed.textContent = fmt(deductions);
  if (et) et.textContent = fmt(takehome);
  if (st) st.textContent = fmt(takehome);
  if (sb) { sb.textContent = fmt(balance); sb.style.color = balance>=0?'#4a6fa5':'#c53030'; }
}

function handleInput(e) {
  const act = e.target.dataset.action;
  const md  = getMonth();

  if (act === 'editApple') {
    md.appleBalance[e.target.dataset.key] = +e.target.value || 0;
    saveState();
  } else if (act === 'editInterest') {
    if (!md.bankInterest) md.bankInterest = {};
    md.bankInterest[e.target.dataset.key] = +e.target.value || 0;
    saveState();
    refreshAccountBals();
  } else if (act === 'editSalary') {
    md.salary = +e.target.value || 0;
    saveState();
    const { deductions, takehome, balance } = calcIncomeNums(md);
    updateIncomeDisplay(deductions, takehome, balance);
    const ss = document.getElementById('sum-salary');
    if (ss) ss.textContent = fmt(md.salary);
    refreshAccountBals();
  } else if (act === 'editTransferAmount') {
    const t = (md.transfers||[]).find(t=>t.id===e.target.dataset.id);
    if (t) t.amount = +e.target.value || 0;
    saveState();
    const { deductions, takehome, balance } = calcIncomeNums(md);
    updateIncomeDisplay(deductions, takehome, balance);
    refreshAccountBals();
  } else if (act === 'editIncomeAmount') {
    const i = (md.otherIncomes||[]).find(i=>i.id===e.target.dataset.id);
    if (i) i.amount = +e.target.value || 0;
    saveState();
    const { deductions, takehome, balance } = calcIncomeNums(md);
    updateIncomeDisplay(deductions, takehome, balance);
    refreshAccountBals();
  } else if (act === 'editIncomeAccount') {
    const i = (md.otherIncomes||[]).find(i=>i.id===e.target.dataset.id);
    if (i) { i.account = e.target.value; saveState(); refreshAccountBals(); }
  } else if (act === 'editIncomeDate') {
    const i = (md.otherIncomes||[]).find(i=>i.id===e.target.dataset.id);
    if (i) { i.date = +e.target.value || null; saveState(); }
  } else if (act === 'editTransferDate') {
    const t = (md.transfers||[]).find(t=>t.id===e.target.dataset.id);
    if (t) { t.date = +e.target.value || null; saveState(); }
  } else if (act === 'editSalaryDate') {
    md.salaryDate = +e.target.value || 10;
    saveState();
  } else if (act === 'editSavingsPaypayDate') {
    md.savingsDeltaPaypayDate = +e.target.value || null;
    saveState();
  } else if (act === 'editSavingsCashDate') {
    md.savingsDeltaCashDate = +e.target.value || null;
    saveState();
  } else if (act === 'editIncomeLabel') {
    const i = (md.otherIncomes||[]).find(i=>i.id===e.target.dataset.id);
    if (i) i.label = e.target.value;
    saveState();
  } else if (act === 'editTransferFee') {
    const t = (md.transfers||[]).find(t=>t.id===e.target.dataset.id);
    if (t) { t.fee = +e.target.value || 0; }
    saveState();
    const { deductions, takehome, balance } = calcIncomeNums(md);
    updateIncomeDisplay(deductions, takehome, balance);
    refreshAccountBals();
  } else if (act === 'editTransferLabel') {
    const t = (md.transfers||[]).find(t=>t.id===e.target.dataset.id);
    if (t) t.label = e.target.value;
    saveState();
  } else if (act === 'editTransferTarget') {
    const t = (md.transfers||[]).find(t=>t.id===e.target.dataset.id);
    if (t) { t.targetAccount = e.target.value; saveState(); refreshAccountBals(); }
  } else if (act === 'editAnaMiles') {
    md.mileDelta = +e.target.value || 0;
    saveState();
    const bal = calcBalance(state.currentMonth);
    const el  = document.getElementById('bal-miles');
    if (el) el.textContent = bal.miles.toLocaleString('ja-JP') + ' マイル';
  } else if (act === 'editSavingsDeltaPaypay') {
    md.savingsDeltaPaypay = +e.target.value || 0;
    saveState();
    const bal = calcBalance(state.currentMonth);
    const ep = document.getElementById('bal-paypay');
    const et = document.getElementById('bal-total');
    if (ep) ep.textContent = fmt(bal.savingsPaypay);
    if (et) et.textContent = fmt(bal.savingsPaypay + bal.savingsCash);
    const { deductions, takehome, balance } = calcIncomeNums(md);
    updateIncomeDisplay(deductions, takehome, balance);
    refreshAccountBals();
  } else if (act === 'editSavingsDeltaCash') {
    md.savingsDeltaCash = +e.target.value || 0;
    saveState();
    const bal = calcBalance(state.currentMonth);
    const ec = document.getElementById('bal-cash');
    const et = document.getElementById('bal-total');
    if (ec) ec.textContent = fmt(bal.savingsCash);
    if (et) et.textContent = fmt(bal.savingsPaypay + bal.savingsCash);
    const { deductions, takehome, balance } = calcIncomeNums(md);
    updateIncomeDisplay(deductions, takehome, balance);
    refreshAccountBals();
  } else if (act === 'editSavingsGoal') {
    md.savingsGoal = +e.target.value || 0;
    saveState();
    const goal = md.savingsGoal;
    const sav  = (md.savingsDeltaPaypay||0) + (md.savingsDeltaCash||0);
    const pct  = goal > 0 ? Math.min(100, Math.round(sav/goal*100)) : 0;
    const over = goal > 0 && sav >= goal;
    const fill = document.querySelector('.prog-fill');
    if (fill) { fill.style.width = pct+'%'; fill.style.background = over?'#38a169':'#4a6fa5'; }
  }
}

function handleChange(e) {
  const act = e.target.dataset.action;
  if (act === 'toggleExpCk') {
    const id = e.target.dataset.id;
    e.target.checked ? selectedExpIds.add(id) : selectedExpIds.delete(id);
    updateBulkDeleteBtns(e.target.dataset.section);
    return;
  }
  if (act === 'editCardPrepaid') {
    const md = getMonth();
    if (!md.cardPrepaid) md.cardPrepaid = {};
    md.cardPrepaid[e.target.dataset.card] = +e.target.value || 0;
    saveState(); render();
    return;
  }
  if (act === 'toggleCardConfirm') {
    const md = getMonth();
    if (!md.confirmedCards) md.confirmedCards = {};
    const card = e.target.dataset.card;
    // チェック時は現在の金額を記録、外すときは0
    md.confirmedCards[card] = e.target.checked ? (+e.target.dataset.amt || true) : 0;
    saveState(); render();
    return;
  }
  if (act === 'editInitialMiles') {
    state.initialBalances.miles = +e.target.value || 0;
    saveState(); render();
  } else if (act === 'editInitialPaypay') {
    state.initialBalances.savingsPaypay = +e.target.value || 0;
    saveState(); render();
  } else if (act === 'editInitialCash') {
    state.initialBalances.savingsCash = +e.target.value || 0;
    saveState(); render();
  } else if (act === 'editInitialAccount') {
    if (!state.initialBalances.accounts) state.initialBalances.accounts = {};
    state.initialBalances.accounts[e.target.dataset.key] = +e.target.value || 0;
    saveState(); render();
  }
}

// XSS対策
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════
//  FIREBASE INIT
// ═══════════════════════════════════════════════
document.addEventListener('click',  handleClick);
document.addEventListener('input',  handleInput);
document.addEventListener('change', handleChange);

// ── ドラッグ&ドロップ（デスクトップ） ──
document.addEventListener('mousedown', e => {
  const h = e.target.closest('[data-drag-handle]');
  if (!h) return;
  const tr = h.closest('tr[data-id]');
  if (tr) tr.setAttribute('draggable', 'true');
});
document.addEventListener('mouseup', () => {
  document.querySelectorAll('tr[draggable="true"]').forEach(tr => tr.removeAttribute('draggable'));
});
document.addEventListener('dragstart', e => {
  const tr = e.target.closest('tr[data-id]');
  if (!tr) return;
  _dragSrcId = tr.dataset.id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => tr.classList.add('dragging'), 0);
});
document.addEventListener('dragend', () => {
  document.querySelectorAll('tr.dragging, tr.drag-over').forEach(t => t.classList.remove('dragging','drag-over'));
  document.querySelectorAll('tr[draggable="true"]').forEach(tr => tr.removeAttribute('draggable'));
  _dragSrcId = null;
});
document.addEventListener('dragover', e => {
  if (!_dragSrcId) return;
  const tr = e.target.closest('tr[data-id]');
  if (!tr) return;
  e.preventDefault();
  document.querySelectorAll('tr.drag-over').forEach(t => t.classList.remove('drag-over'));
  if (tr.dataset.id !== _dragSrcId) tr.classList.add('drag-over');
});
document.addEventListener('drop', e => {
  e.preventDefault();
  const tr = e.target.closest('tr[data-id]');
  if (!tr || !_dragSrcId || tr.dataset.id === _dragSrcId) return;
  reorderExp(_dragSrcId, tr.dataset.id);
});

// ── タッチドラッグ（モバイル） ──
document.addEventListener('touchstart', e => {
  const h = e.target.closest('[data-drag-handle]');
  if (!h) return;
  const tr = h.closest('tr[data-id]');
  if (!tr) return;
  const touch = e.touches[0];
  const rect  = tr.getBoundingClientRect();
  const clone = tr.cloneNode(true);
  Object.assign(clone.style, {
    position:'fixed', left:rect.left+'px', top:rect.top+'px',
    width:rect.width+'px', zIndex:9999, opacity:'0.85',
    pointerEvents:'none', boxShadow:'0 4px 20px rgba(0,0,0,.3)',
    background:'#fff', display:'table',
  });
  document.body.appendChild(clone);
  tr.classList.add('dragging');
  _touchDrag = { id:tr.dataset.id, sourceEl:tr, clone, offsetY: touch.clientY - rect.top, overId: null };
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!_touchDrag) return;
  e.preventDefault();
  const touch = e.touches[0];
  _touchDrag.clone.style.top = (touch.clientY - _touchDrag.offsetY) + 'px';
  _touchDrag.clone.style.display = 'none';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  _touchDrag.clone.style.display = 'table';
  const targetTr = el?.closest('tr[data-id]');
  document.querySelectorAll('tr.drag-over').forEach(t => t.classList.remove('drag-over'));
  if (targetTr && targetTr !== _touchDrag.sourceEl) {
    targetTr.classList.add('drag-over');
    _touchDrag.overId = targetTr.dataset.id;
  } else {
    _touchDrag.overId = null;
  }
}, { passive: false });

document.addEventListener('touchend', () => {
  if (!_touchDrag) return;
  _touchDrag.clone.remove();
  _touchDrag.sourceEl.classList.remove('dragging');
  document.querySelectorAll('tr.drag-over').forEach(t => t.classList.remove('drag-over'));
  if (_touchDrag.overId) reorderExp(_touchDrag.id, _touchDrag.overId);
  _touchDrag = null;
});

let fbDb   = null;
let fbAuth = null;
let fbUser = null;

firebase.initializeApp(FIREBASE_CONFIG);
fbAuth = firebase.auth();
fbDb   = firebase.database();

function showLoginScreen(errorMsg) {
  document.getElementById('app').innerHTML = '';
  const ls = document.getElementById('login-screen');
  ls.style.display = 'flex';
  const err = document.getElementById('login-error');
  if (errorMsg) { err.textContent = errorMsg; err.style.display = 'block'; }
  else { err.style.display = 'none'; }
}

function signInWithGoogle() {
  fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(e => showLoginScreen('ログインに失敗しました: ' + e.message));
}

fbAuth.onAuthStateChanged(user => {
  if (!user) { showLoginScreen(); return; }

  // 許可されたアカウントか確認
  if (user.email !== ALLOWED_EMAIL) {
    fbAuth.signOut();
    showLoginScreen(`このアカウント（${user.email}）はアクセスできません。`);
    return;
  }

  fbUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').innerHTML =
    '<div style="padding:60px;text-align:center;color:#718096;font-size:14px">読み込み中…</div>';

  const ref = fbDb.ref('kakeibo/' + user.uid);

  ref.once('value').then(snap => {
    const cloudData = snap.val();
    if (cloudData && cloudData.data) {
      applyRemoteState(cloudData);
    } else {
      // localStorageにデータがあれば移行する
      try {
        const local = JSON.parse(localStorage.getItem('kakeibo_v1') || 'null');
        if (local && local.data) {
          applyRemoteState(local);
          saveState();
          localStorage.removeItem('kakeibo_v1');
        } else {
          state.data = { '202604': mk202604(), '202605': mk202605() };
          state.cardSettings = DEFAULT_CARD_SETTINGS;
        }
      } catch(e) {
        state.data = { '202604': mk202604(), '202605': mk202605() };
        state.cardSettings = DEFAULT_CARD_SETTINGS;
      }
    }

    // 他端末からの変更をリアルタイムで受け取る
    ref.on('value', snap => {
      const s = snap.val();
      if (!s) return;
      if (stableJson(s) === lastSavedJson) return; // 自分の書き込みは無視
      lastSavedJson = stableJson(s);
      applyRemoteState(s);
      // 入力中はフォーカスを奪わない
      const active = document.activeElement;
      if (active && ['INPUT', 'TEXTAREA', 'SELECT'].includes(active.tagName)) return;
      render();
    });

    render();
  }).catch(e => {
    showLoginScreen('データの読み込みに失敗しました: ' + e.message);
  });
});
