<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>複合機 提案比較書 作成ツール</title>
<style>
/* ═══════════════════════════════════════
   変数
═══════════════════════════════════════ */
:root{
  --navy:#1a5276; --navy-dk:#154360;
  --green:#1e8449; --green-dk:#196f3d;
  --gray:#5d6d7e;
  --red:#c0392b;
  --amber:#856404;
  --border:#d5d8dc;
  --text:#2c3e50; --text-sub:#7f8c8d;
  --bg:#e8ecf0;
}

/* ═══════════════════════════════════════
   画面UI（印刷時は非表示）
═══════════════════════════════════════ */
@media screen{
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
       background:var(--bg);color:var(--text);font-size:13px;}

  /* アプリバー */
  .app-bar{
    background:var(--navy-dk);color:#fff;padding:0 24px;height:56px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .app-bar-title{font-size:15px;font-weight:bold;letter-spacing:.04em;}
  .app-bar-sub{font-size:11px;opacity:.55;margin-left:10px;}
  .btn-print{
    background:var(--green);color:#fff;border:none;
    padding:9px 22px;border-radius:5px;font-size:13px;font-weight:bold;
    cursor:pointer;letter-spacing:.04em;transition:background .15s;
    font-family:inherit;
  }
  .btn-print:hover{background:var(--green-dk);}

  /* フォームラッパー */
  .form-wrap{max-width:860px;margin:0 auto;padding:24px 16px 60px;}

  /* フォームカード */
  .fc{background:#fff;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.08);
      margin-bottom:18px;overflow:hidden;}
  .fc-head{
    padding:11px 20px;font-size:13px;font-weight:bold;
    letter-spacing:.05em;color:#fff;
  }
  .fc-head.blue{background:var(--navy);}
  .fc-head.green{background:var(--green);}
  .fc-head.gray{background:var(--gray);}
  .fc-head.amber{background:var(--amber);}
  .fc-body{padding:16px 20px;}

  /* グリッド */
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px 20px;}
  .g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px 20px;}
  @media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr;}}

  /* フィールド */
  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:11px;color:var(--text-sub);font-weight:bold;letter-spacing:.05em;}
  .field input,.field select{
    height:36px;padding:0 10px;border:1.5px solid var(--border);border-radius:5px;
    font-size:13px;color:var(--text);background:#fafbfc;transition:border-color .15s;
    font-family:inherit;
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--navy);background:#fff;}
  .field input[type="number"]{text-align:right;}

  hr.div{border:none;border-top:1.5px solid #f0f2f5;margin:14px 0;}

  /* パターンテーブル */
  .pt-tbl{width:100%;border-collapse:collapse;margin-top:4px;}
  .pt-tbl thead th{
    background:#f4f6f8;padding:7px 8px;text-align:left;
    font-size:11px;color:var(--text-sub);font-weight:bold;
    border-bottom:2px solid var(--border);white-space:nowrap;
  }
  .pt-tbl tbody td{padding:5px 6px;border-bottom:1px solid #f0f2f5;vertical-align:middle;}
  .pt-tbl input{
    width:100%;height:32px;padding:0 8px;border:1.5px solid var(--border);
    border-radius:4px;font-size:12px;background:#fafbfc;font-family:inherit;
  }
  .pt-tbl input:focus{outline:none;border-color:var(--navy);}
  .pt-tbl input[type="number"]{text-align:right;}

  .btn-rm{
    background:none;border:1px solid #e0e0e0;border-radius:4px;
    padding:4px 8px;cursor:pointer;color:var(--red);font-size:12px;
    font-weight:bold;transition:background .1s;width:100%;
  }
  .btn-rm:hover{background:#fee2e2;}
  .btn-add{
    margin-top:10px;background:none;border:1.5px dashed var(--border);
    border-radius:6px;padding:8px;cursor:pointer;color:var(--navy);
    font-size:12px;font-weight:bold;width:100%;transition:background .1s;
  }
  .btn-add:hover{background:#eaf2f8;}
  .btn-be{
    margin-top:6px;background:#eaf2f8;border:1.5px solid var(--navy);
    border-radius:6px;padding:8px;cursor:pointer;color:var(--navy);
    font-size:12px;font-weight:bold;width:100%;transition:background .1s;
  }
  .btn-be:hover{background:#d6e8f5;}

  /* プレビューヘッダー */
  .preview-hd{
    display:flex;align-items:center;justify-content:space-between;
    margin:28px 0 12px;
  }
  .preview-hd-title{font-size:15px;font-weight:bold;color:var(--text);letter-spacing:.04em;}
  .preview-hd-note{font-size:11px;color:var(--text-sub);}

  /* 印刷プレビュー内でのページ枠 */
  .page{
    background:#fff;border-radius:6px;
    box-shadow:0 4px 20px rgba(0,0,0,.1);border:1px solid var(--border);
    padding:14mm 16mm;position:relative;overflow:hidden;
    margin-bottom:20px;
  }
}

/* ═══════════════════════════════════════
   印刷設定
═══════════════════════════════════════ */
@media print{
  *{box-sizing:border-box;margin:0;padding:0;}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .screen-only{display:none!important;}
  @page{size:A4 landscape;margin:14mm 16mm;}
  .page{
    width:267mm;min-height:180mm;padding:0;
    page-break-after:always;position:relative;overflow:hidden;background:#fff;
  }
  .page:last-child{page-break-after:auto;}
}

/* ═══════════════════════════════════════
   印刷ドキュメント スタイル
   （画面プレビュー＆実印刷 共通）
═══════════════════════════════════════ */
.print-doc{
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  color:#2c3e50;font-size:11px;line-height:1.5;
}

/* ページ角の水玉装飾 */
.page::before,.page::after{
  content:'';position:absolute;width:120px;height:120px;
  border-radius:50%;opacity:.08;pointer-events:none;
}
.page::before{top:-30px;left:-30px;
  background:radial-gradient(circle,#1a5276 1px,transparent 1px);background-size:8px 8px;}
.page::after{bottom:-30px;right:-30px;
  background:radial-gradient(circle,#1e8449 1px,transparent 1px);background-size:8px 8px;}

/* ページヘッダー */
.ph{
  display:flex;justify-content:space-between;align-items:flex-end;
  padding-bottom:10px;margin-bottom:14px;border-bottom:3px solid #1a5276;
}
.ph h1{font-size:18px;color:#1a5276;letter-spacing:.06em;font-weight:900;}
.ph h1 small{font-size:11px;font-weight:normal;color:#7f8c8d;margin-left:8px;}
.ph .meta{text-align:right;font-size:10px;color:#7f8c8d;line-height:1.7;}

/* セクション見出し */
.st{
  font-size:13px;font-weight:bold;color:#1a5276;
  margin:16px 0 10px;padding:6px 14px;
  background:#eaf2f8;border-left:4px solid #1a5276;border-radius:0 4px 4px 0;
}

/* 比較2カラム */
.cc{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;}
.cc-card{border:1px solid #d5d8dc;border-radius:8px;overflow:hidden;}
.cc-head{padding:12px 18px;color:#fff;font-size:13px;font-weight:bold;letter-spacing:.04em;}
.cc-head.cur{background:#1a5276;}
.cc-head.pro{background:#1e8449;}
.cc-head small{display:block;font-size:10px;font-weight:normal;opacity:.85;margin-top:3px;}
.cc-body{background:#fff;}
.cr{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 18px;border-bottom:1px solid #eaecee;font-size:11px;
}
.cr:last-child{border-bottom:none;}
.cr .lb{color:#7f8c8d;font-size:10px;}
.cr .vl{font-weight:bold;color:#2c3e50;font-size:11px;}
.cr .vl.cb{color:#1a5276;}
.cr .vl.cg{color:#1e8449;}
.cr.sh{background:#f8f9f9;padding:6px 18px;}
.cr.sh .lb{font-size:9px;font-weight:bold;color:#5d6d7e;letter-spacing:.08em;}
.cr.ch{background:#eafaf1;}
.bdg{display:inline-block;font-size:9px;border-radius:3px;padding:1px 6px;margin-left:4px;font-weight:bold;}
.bdg-dn{background:#d5f5e3;color:#1e8449;}
.bdg-up{background:#d4e6f1;color:#1a5276;}

/* 条件変更サマリー */
.cs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.cs-box{
  border:2px solid #d4e6f1;border-radius:8px;padding:12px 16px;
  display:flex;flex-direction:column;align-items:center;text-align:center;background:#fff;
}
.cs-lbl{font-size:9px;color:#7f8c8d;margin-bottom:6px;letter-spacing:.05em;font-weight:bold;}
.cs-arr{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:bold;}
.cs-arr .fr{color:#1a5276;} .cs-arr .to{color:#1e8449;}
.cs-arr .ar{color:#7f8c8d;font-size:11px;}
.cs-note{font-size:9px;color:#7f8c8d;margin-top:4px;}

/* ルールグリッド */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px;}
.rb{border:1px solid #d5d8dc;border-radius:8px;overflow:hidden;}
.rb-hd{padding:8px 14px;font-size:10px;font-weight:bold;letter-spacing:.04em;}
.rb-hd.a{background:#fef9e7;color:#b7950b;border-bottom:2px solid #f9e79f;}
.rb-hd.b{background:#eaf2f8;color:#1a5276;border-bottom:2px solid #d4e6f1;}
.rb-bd{padding:10px 14px;font-size:10px;color:#2c3e50;line-height:1.7;}
.rex{margin-top:6px;padding:6px 12px;border-radius:4px;font-size:10px;font-weight:bold;}
.rex.a{background:#fef9e7;color:#b7950b;}
.rex.b{background:#eaf2f8;color:#1a5276;}

/* ページフッター */
.pf{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;justify-content:flex-end;align-items:center;
  border-top:2px solid #1a5276;padding-top:6px;
}
.pf img{height:22px;opacity:.9;}

/* シミュレーションテーブル */
.st2{width:100%;border-collapse:collapse;font-size:10px;margin-top:8px;border:2px solid #d5d8dc;}
.st2 thead tr.r1 th{
  padding:8px;text-align:center;color:#fff;font-size:10px;white-space:nowrap;
  border-right:1px solid rgba(255,255,255,.3);
}
.st2 thead tr.r2 th{
  padding:5px 8px;text-align:center;color:#fff;font-size:9px;white-space:nowrap;
  font-weight:normal;border-right:1px solid rgba(255,255,255,.3);
}
.st2 thead th.thg{background:#5d6d7e;}
.st2 thead th.thu{background:#5d6d7e;}
.st2 thead th.thc{background:#1a5276;}
.st2 thead th.thc2{background:#1a5276;opacity:.85;}
.st2 thead th.thp{background:#1e8449;}
.st2 thead th.thp2{background:#1e8449;opacity:.85;}
.st2 thead th.thd{background:#5d6d7e;}
.st2 tbody tr{border-bottom:1px solid #d5d8dc;}
.st2 tbody tr:nth-child(even){background:#f8f9f9;}
.st2 tbody tr.rbe{background:#fffff0!important;}
.st2 tbody tr.rloss{background:#fff5f5!important;}
.st2 tbody tr.rgain{background:#f0fff4!important;}
.st2 td{
  padding:7px 8px;text-align:center;vertical-align:middle;
  font-size:10.5px;border-right:1px solid #d5d8dc;
}
.st2 td:last-child{border-right:none;}
.st2 td .sub{font-size:9px;color:#7f8c8d;margin-top:2px;}
.st2 td.cb{color:#1a5276;font-weight:bold;}
.st2 td.cg{color:#1e8449;font-weight:bold;}
.st2 td.dm{color:#1e8449;font-weight:bold;}
.st2 td.dp{color:#c0392b;font-weight:bold;}
.st2 td.dz{color:#7f8c8d;font-weight:bold;}
.tb{display:inline-block;font-size:8px;border-radius:3px;padding:1px 5px;margin-left:2px;font-weight:bold;}
.tb.cur{background:#d4e6f1;color:#1a5276;border:1px solid #d4e6f1;}
.tb.pro{background:#fef9e7;color:#b7950b;border:1px solid #f9e79f;}

/* 年間テーブル */
.at{width:100%;border-collapse:collapse;font-size:10px;margin-top:8px;border:2px solid #d5d8dc;}
.at thead th{
  padding:7px 8px;text-align:center;font-size:9px;color:#fff;
  background:#5d6d7e;border-right:1px solid rgba(255,255,255,.3);
}
.at thead th.thc{background:#1a5276;}
.at thead th.thp{background:#1e8449;}
.at thead th.thd{background:#5d6d7e;}
.at tbody tr{border-bottom:1px solid #d5d8dc;}
.at tbody tr:nth-child(even){background:#f8f9f9;}
.at td{
  padding:7px 8px;text-align:center;font-size:10.5px;
  vertical-align:middle;border-right:1px solid #d5d8dc;
}
.at td:last-child{border-right:none;}
.at td.cb{color:#1a5276;font-weight:bold;}
.at td.cg{color:#1e8449;font-weight:bold;}
.at td.dm{color:#1e8449;font-weight:bold;}
.at td.dp{color:#c0392b;font-weight:bold;}
.at td.dz{color:#7f8c8d;font-weight:bold;}

/* 前提条件ボックス */
.premise{
  font-size:10px;color:#2c3e50;margin-bottom:8px;line-height:1.7;
  padding:10px 16px;background:#eaf2f8;border-radius:6px;
  border-left:4px solid #1a5276;
}
.premise strong{color:#1a5276;}
</style>
</head>
<body>

<!-- ══════════════ 画面UI ══════════════ -->
<div class="screen-only">

  <div class="app-bar">
    <div>
      <span class="app-bar-title">複合機 提案比較書 作成ツール</span>
      <span class="app-bar-sub">入力内容がそのまま印刷プレビューに反映されます</span>
    </div>
    <button class="btn-print" onclick="window.print()">🖨 印刷 / PDF保存</button>
  </div>

  <div class="form-wrap">

    <!-- ① 顧客情報 -->
    <div class="fc">
      <div class="fc-head gray">① 顧客情報</div>
      <div class="fc-body">
        <div class="g2">
          <div class="field">
            <label>顧客名（会社名）</label>
            <input type="text" id="clientName" value="テスト株式会社" oninput="render()">
          </div>
          <div class="field">
            <label>作成日</label>
            <input type="text" id="docDate" value="2026年4月23日" oninput="render()">
          </div>
        </div>
      </div>
    </div>

    <!-- ② 現状の機器 -->
    <div class="fc">
      <div class="fc-head blue">② 現状の機器</div>
      <div class="fc-body">
        <div class="g2">
          <div class="field"><label>メーカー</label>
            <input type="text" id="curMaker" value="Canon" oninput="render()"></div>
          <div class="field"><label>機種名</label>
            <input type="text" id="curModel" value="現行機" oninput="render()"></div>
        </div>
        <hr class="div">
        <div class="g4">
          <div class="field"><label>月額リース料（円）</label>
            <input type="number" id="curLease" value="10000" min="0" oninput="render()"></div>
          <div class="field"><label>リース回数</label>
            <input type="text" id="curLeaseTimes" value="60回（5年）" oninput="render()"></div>
          <div class="field"><label>契約開始</label>
            <input type="text" id="curFrom" value="2021年9月" oninput="render()"></div>
          <div class="field"><label>契約満了</label>
            <input type="text" id="curTo" value="2026年8月" oninput="render()"></div>
        </div>
        <hr class="div">
        <div class="g3">
          <div class="field"><label>基本料 / 最低保証額（円/月）</label>
            <input type="number" id="curBasic" value="1000" min="0" oninput="render()"></div>
          <div class="field"><label>モノクロ単価（円/枚）</label>
            <input type="number" id="curMono" value="0.80" step="0.01" min="0" oninput="render()"></div>
          <div class="field"><label>カラー単価（円/枚）</label>
            <input type="number" id="curColor" value="8.00" step="0.01" min="0" oninput="render()"></div>
        </div>
      </div>
    </div>

    <!-- ③ 提案の機器 -->
    <div class="fc">
      <div class="fc-head green">③ 提案の機器</div>
      <div class="fc-body">
        <div class="g2">
          <div class="field"><label>メーカー</label>
            <input type="text" id="propMaker" value="京セラ" oninput="render()"></div>
          <div class="field"><label>機種名</label>
            <input type="text" id="propModel" value="TASKalfa MZ3501ci" oninput="render()"></div>
        </div>
        <hr class="div">
        <div class="g4">
          <div class="field"><label>月額リース料（円）</label>
            <input type="number" id="propLease" value="9800" min="0" oninput="render()"></div>
          <div class="field"><label>リース回数</label>
            <input type="text" id="propLeaseTimes" value="60回（5年）" oninput="render()"></div>
          <div class="field"><label>契約開始（予定）</label>
            <input type="text" id="propFrom" value="2026年9月" oninput="render()"></div>
          <div class="field"><label>契約満了（予定）</label>
            <input type="text" id="propTo" value="2031年8月" oninput="render()"></div>
        </div>
        <hr class="div">
        <div class="g3">
          <div class="field"><label>基本料 / 最低保証額（円/月）</label>
            <input type="number" id="propBasic" value="1500" min="0" oninput="render()"></div>
          <div class="field"><label>モノクロ単価（円/枚）</label>
            <input type="number" id="propMono" value="0.70" step="0.01" min="0" oninput="render()"></div>
          <div class="field"><label>カラー単価（円/枚）</label>
            <input type="number" id="propColor" value="7.00" step="0.01" min="0" oninput="render()"></div>
        </div>
      </div>
    </div>

    <!-- ④ シミュレーションパターン -->
    <div class="fc">
      <div class="fc-head amber">④ シミュレーションパターン</div>
      <div class="fc-body">
        <table class="pt-tbl">
          <thead>
            <tr>
              <th style="width:28%">パターン名</th>
              <th style="width:20%">モノクロ枚数</th>
              <th style="width:20%">カラー枚数</th>
              <th style="width:18%">集計月数</th>
              <th style="width:14%">削除</th>
            </tr>
          </thead>
          <tbody id="ptBody"></tbody>
        </table>
        <button class="btn-add" onclick="addPt()">＋ パターンを追加</button>
        <button class="btn-be"  onclick="addBe()">⚖ 損益分岐点を自動計算して追加（モノクロのみ）</button>
      </div>
    </div>

    <!-- プレビューラベル -->
    <div class="preview-hd">
      <span class="preview-hd-title">📄 印刷プレビュー</span>
      <span class="preview-hd-note">右上「印刷 / PDF保存」ボタンで出力できます</span>
    </div>

  </div><!-- /form-wrap -->
</div><!-- /screen-only -->

<!-- ══════════════ 印刷ドキュメント ══════════════ -->
<div class="print-doc" id="printDoc"></div>

<!-- ══════════════ JS ══════════════ -->

/* ─── ユーティリティ ─── */
function gv(id){ return document.getElementById(id)?.value||''; }
function gn(id){ return parseFloat(document.getElementById(id)?.value)||0; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function jpy(v){ return '¥'+Math.round(v).toLocaleString(); }
function jpyD(v){ // 小数対応（単価用）
  let r=parseFloat(v.toFixed(2));
  return '¥'+r.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2});
}
function countFee(basic,monoP,colorP,mono,color){
  return Math.max(basic, monoP*mono + colorP*color);
}

/* ─── 損益分岐点計算（モノクロのみ） ─── */
function calcBE(c,p){
  // Region2: c above basic, p below basic
  if(c.mono>0){
    let n=(p.lease+p.basic-c.lease)/c.mono;
    if(n>0 && c.mono*n>=c.basic && p.mono*n<=p.basic) return Math.ceil(n);
  }
  // Region3: c below basic, p above basic
  if(p.mono>0){
    let n=(c.lease+c.basic-p.lease)/p.mono;
    if(n>0 && c.mono*n<=c.basic && p.mono*n>=p.basic) return Math.ceil(n);
  }
  // Region4: both above basic
  if(Math.abs(c.mono-p.mono)>0.0001){
    let n=(p.lease-c.lease)/(c.mono-p.mono);
    if(n>0 && c.mono*n>=c.basic && p.mono*n>=p.basic) return Math.ceil(n);
  }
  return null;
}

/* ─── 差額バッジ ─── */
function badge(from,to,isYen){
  const d=to-from;
  if(Math.abs(d)<0.0001) return '';
  const abs=isYen?jpy(Math.abs(d)):jpyD(Math.abs(d));
  if(d<0) return `<span class="bdg bdg-dn">▼${abs}</span>`;
  return `<span class="bdg bdg-up">▲${abs}</span>`;
}
function diffCls(d){ return d<0?'dm':d>0?'dp':'dz'; }
function diffTxt(d){
  if(d===0) return '±¥0';
  return (d<0?'▼':'▲')+'¥'+Math.abs(Math.round(d)).toLocaleString();
}

/* ─── パターンフォーム描画 ─── */
function renderPtForm(){
  const tb=document.getElementById('ptBody');
  if(!tb) return;
  tb.innerHTML=pts.map((p,i)=>`
    <tr>
      <td><input type="text" value="${esc(p.name)}" oninput="pts[${i}].name=this.value;render()"></td>
      <td><input type="number" value="${p.mono}" min="0" oninput="pts[${i}].mono=+this.value;render()"></td>
      <td><input type="number" value="${p.color}" min="0" oninput="pts[${i}].color=+this.value;render()"></td>
      <td><input type="number" value="${p.months}" min="1" max="120" oninput="pts[${i}].months=+this.value;render()"></td>
      <td><button class="btn-rm" onclick="removePt(${i})">✕</button></td>
    </tr>`).join('');
}
function addPt(){
  pts.push({name:`パターン${pts.length+1}`,mono:0,color:0,months:12});
  renderPtForm(); render();
}
function removePt(i){ pts.splice(i,1); renderPtForm(); render(); }
function addBe(){
  const c={lease:gn('curLease'),basic:gn('curBasic'),mono:gn('curMono'),color:gn('curColor')};
  const p={lease:gn('propLease'),basic:gn('propBasic'),mono:gn('propMono'),color:gn('propColor')};
  const be=calcBE(c,p);
  if(be===null){ alert('損益分岐点を計算できませんでした。\n単価差がない・条件によっては分岐点が存在しない場合があります。'); return; }
  pts.push({name:`損益分岐点（${be.toLocaleString()}枚）`,mono:be,color:0,months:12});
  renderPtForm(); render();
}

        <div class="rex b">
          現状）モノ3,000枚：${jpyD(c.mono)}×3,000＝${jpy(c.mono*3000)} → ${jpy(c.mono*3000)}請求<br>
          提案）モノ3,000枚：${jpyD(p.mono)}×3,000＝${jpy(p.mono*3000)} → ${jpy(p.mono*3000)}請求
        </div>
      </div>
    </div>
  </div>

  <div class="pf"><img src="${LOGO}" alt=""></div>
</div>`;

  /* シミュレーション行を生成 */
  const simRows=pts.map(pt=>{
    const cFee=countFee(c.basic,c.mono,c.color,pt.mono,pt.color);
    const pFee=countFee(p.basic,p.mono,p.color,pt.mono,pt.color);
    const cTot=c.lease+cFee;
    const pTot=p.lease+pFee;
    const diff=pTot-cTot; // 負=提案が安い=メリット

    const cAbove=(c.mono*pt.mono+c.color*pt.color)>=c.basic;
    const pAbove=(p.mono*pt.mono+p.color*pt.color)>=p.basic;

    const rc=diff<0?'rgain':diff>0?'rloss':'rbe';
    const dc=diffCls(-diff); // -diffにして「節約」が正方向
    const dt=diffText(-diff);

    const cCalcDetail=`${jpy(c.mono*pt.mono)}+${jpy(c.color*pt.color)}=${jpy(c.mono*pt.mono+c.color*pt.color)}`;
    const pCalcDetail=`${jpy(p.mono*pt.mono)}+${jpy(p.color*pt.color)}=${jpy(p.mono*pt.mono+p.color*pt.color)}`;

    const cTbTag=!cAbove?`<span class="tb cur">基本料</span>`:'';
    const pTbTag=!pAbove?`<span class="tb pro">基本料</span>`:'';

    return {pt,cFee,pFee,cTot,pTot,diff,rc,dc,dt,cCalcDetail,pCalcDetail,cTbTag,pTbTag};
  });

  const simRowsHTML=simRows.map(r=>`
    <tr class="${r.rc}">
      <td>${Math.round(r.pt.mono+r.pt.color).toLocaleString()}枚</td>
      <td>${Math.round(r.pt.mono).toLocaleString()}枚</td>
      <td>${Math.round(r.pt.color).toLocaleString()}枚</td>
      <td>${jpy(r.cFee)}${r.cTbTag}<div class="sub">${r.cCalcDetail}</div></td>
      <td class="cb">${jpy(r.cTot)}</td>
      <td>${jpy(r.pFee)}${r.pTbTag}<div class="sub">${r.pCalcDetail}</div></td>
      <td class="cg">${jpy(r.pTot)}</td>
      <td class="${r.dc}">${r.dt}</td>
    </tr>`).join('');

  const annualHTML=simRows.map(r=>{
    const cAnn=r.cTot*r.pt.months;
    const pAnn=r.pTot*r.pt.months;
    const aDiff=pAnn-cAnn;
    return `<tr>
      <td>${Math.round(r.pt.mono+r.pt.color).toLocaleString()}枚（${r.pt.months}ヶ月間）</td>
      <td class="cb">${jpy(cAnn)}</td>
      <td class="cg">${jpy(pAnn)}</td>
      <td class="${diffCls(-aDiff)}">${diffText(-aDiff)}</td>
    </tr>`;}).join('');

  /* ページ2 */
  const p2=`<div class="page">
  <div class="ph">
    <h1>月額コストシミュレーション <small>使用枚数パターン別 試算表</small></h1>
    <div class="meta">${esc(cl)} 御中<br>${esc(dt)}</div>
  </div>

  <div class="premise">
    <strong>前提条件</strong>　月額合計 ＝ リース料 ＋ カウント料金　／　カウント料金 ＝ MAX（基本料、モノクロ単価×モノクロ枚数 ＋ カラー単価×カラー枚数）<br>
    現状：リース${jpy(c.lease)}・基本料${jpy(c.basic)}・モノ${jpyD(c.mono)}・カラー${jpyD(c.color)}　／
    ご提案：リース${jpy(p.lease)}・基本料${jpy(p.basic)}・モノ${jpyD(p.mono)}・カラー${jpyD(p.color)}
  </div>

  <div class="st">月額コスト試算</div>
  <table class="st2">
    <thead>
      <tr class="r1">
        <th rowspan="2" class="thg">合計枚数<br>（月間）</th>
        <th colspan="2" class="thu">使用枚数内訳</th>
        <th colspan="2" class="thc">現状（${esc(c.maker)} ${esc(c.model)}）</th>
        <th colspan="2" class="thp">ご提案（${esc(p.maker)} ${esc(p.model)}）</th>
        <th rowspan="2" class="thd">月額差額<br>（節約額）</th>
      </tr>
      <tr class="r2">
        <th class="thu">モノクロ</th><th class="thu">カラー</th>
        <th class="thc2">カウント料金</th><th class="thc2">月額合計</th>
        <th class="thp2">カウント料金</th><th class="thp2">月額合計</th>
      </tr>
    </thead>
    <tbody>${simRowsHTML}</tbody>
  </table>

  <div class="st" style="margin-top:14px;">集計期間別コスト差額</div>
  <table class="at">
    <thead>
      <tr>
        <th>合計枚数（月間）</th>
        <th class="thc">現状 期間合計</th>
        <th class="thp">ご提案 期間合計</th>
        <th class="thd">差額（節約額）</th>
      </tr>
    </thead>
    <tbody>${annualHTML}</tbody>
  </table>

  <div class="pf"><img src="${LOGO}" alt=""></div>
</div>`;

  document.getElementById('printDoc').innerHTML=p1+p2;
}

/* ─── 初期化 ─── */
renderPtForm();
render();
</script>
</body>
</html>
